<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mouse OS ✨</title>
    <style>
        /* 🍎 防弹背景：加上了纯色保底，绝对不可能再白屏 */
        body {
            margin: 0; padding: 0; height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
            background-color: #1a1a2e; 
            background-image: linear-gradient(135deg, #111122 0%, #221133 50%, #331122 100%);
            overflow: hidden; display: flex; flex-direction: column; justify-content: space-between;
            -webkit-user-select: none;
        }

        .status-bar { padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; color: white; font-size: 14px; font-weight: 600; background: rgba(0,0,0,0.2); }
        .live-dot { width: 8px; height: 8px; background: #34C759; border-radius: 50%; animation: blink 2s infinite; }
        @keyframes blink { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }

        .desktop-grid { flex: 1; padding: 40px; display: flex; gap: 35px; align-content: flex-start; flex-wrap: wrap; }
        
        .app-icon { display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: 0.2s; width: 70px;}
        .app-icon:active { transform: scale(0.9); }
        .icon-box { width: 65px; height: 65px; border-radius: 18px; display: flex; justify-content: center; align-items: center; font-size: 34px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .icon-text { color: white; font-size: 13px; font-weight: 600; margin-top: 8px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }

        .dock-container { padding-bottom: 25px; display: flex; justify-content: center; width: 100%; }
        .dock { background: rgba(255,255,255,0.15); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 12px 25px; border-radius: 32px; display: flex; gap: 20px; }
        .dock .icon-text { display: none; }
        .dock .icon-box { width: 55px; height: 55px; font-size: 28px; }

        .window-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); z-index: 100; display: none; justify-content: center; align-items: center; opacity: 0; transition: 0.3s; }
        .window-frame { width: 92%; max-width: 500px; height: 85vh; background: #1c1c38; border-radius: 28px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 20px 50px rgba(0,0,0,0.5); transform: translateY(30px) scale(0.95); transition: 0.3s; }
        .window-header { height: 45px; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; position: relative; }
        .window-title { font-size: 15px; font-weight: 600; color: white; }
        .close-btn { position: absolute; right: 15px; width: 26px; height: 26px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 12px; color: white; cursor: pointer; border: none; }
        
        iframe { flex: 1; width: 100%; border: none; background: #fff; }
    </style>
</head>
<body>
    <div class="status-bar">
        <div style="display:flex; align-items:center; gap:8px;"><div class="live-dot"></div><div id="clock">00:00</div></div>
        <div>🔋 100%</div>
    </div>

    <div class="desktop-grid">
        <div class="app-icon" onclick="openApp('nutrition.html', 'AI 营养师')">
            <div class="icon-box">🥗</div>
            <div class="icon-text">营养管家</div>
        </div>
        <div class="app-icon" onclick="openApp('game.html', 'Color Wars')">
            <div class="icon-box">🕹️</div>
            <div class="icon-text">领地战</div>
        </div>
    </div>

    <div class="dock-container">
        <div class="dock">
            <div class="app-icon" onclick="openApp('nutrition.html', 'AI 营养师')"><div class="icon-box">🥗</div></div>
            <div class="app-icon" onclick="openApp('game.html', 'Color Wars')"><div class="icon-box">🕹️</div></div>
        </div>
    </div>

    <div class="window-overlay" id="appOverlay">
        <div class="window-frame" id="appFrame">
            <div class="window-header">
                <div class="window-title" id="appTitle">App</div>
                <button class="close-btn" onclick="closeApp()">✖</button>
            </div>
            <iframe id="appContent" src=""></iframe>
        </div>
    </div>

    <script>
        function updateClock() { document.getElementById('clock').innerText = new Date().toLocaleTimeString('zh-CN', {hour: '2-digit', minute:'2-digit'}); }
        setInterval(updateClock, 1000); updateClock();

        function openApp(url, title) {
            const overlay = document.getElementById('appOverlay');
            const frame = document.getElementById('appFrame');
            document.getElementById('appTitle').innerText = title;
            document.getElementById('appContent').src = url; 
            overlay.style.display = 'flex';
            setTimeout(() => { overlay.style.opacity = '1'; frame.style.transform = 'translateY(0) scale(1)'; }, 20);
        }

        function closeApp() {
            const overlay = document.getElementById('appOverlay');
            const frame = document.getElementById('appFrame');
            overlay.style.opacity = '0'; frame.style.transform = 'translateY(30px) scale(0.95)';
            setTimeout(() => { overlay.style.display = 'none'; document.getElementById('appContent').src = ''; }, 300);
        }
    </script>
</body>
</html>
