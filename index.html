<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AI 营养师">
    <link rel="apple-touch-icon" href="https://api.dicebear.com/7.x/notionists/svg?seed=mouse&backgroundColor=ff8a65">
    <title>AI 智能营养追踪器</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* 🌙 进阶三：深夜护眼模式的颜色变量 */
        :root {
            --bg-color: #f7f9fc;
            --card-bg: white;
            --text-color: #333;
            --sub-text: #888;
            --input-bg: white;
            --input-border: #ddd;
            --box-bg: #fff3e0;
            --hr-color: #eee;
        }

        /* 🌙 触发深色模式时的颜色替换 */
        body.dark-mode {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --sub-text: #aaa;
            --input-bg: #2d2d2d;
            --input-border: #444;
            --box-bg: #332920;
            --hr-color: #444;
        }

        body { font-family: 'PingFang SC', sans-serif; text-align: center; background-color: var(--bg-color); color: var(--text-color); padding: 20px; transition: 0.3s; -webkit-user-select: none; }
        .card { background: var(--card-bg); padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); max-width: 500px; margin: 0 auto; transition: 0.3s; position: relative; }
        
        /* 顶部小开关 */
        .header-actions { position: absolute; top: 20px; right: 20px; display: flex; gap: 10px; }
        .icon-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-color); }

        h2 { color: #ff8a65; }
        textarea { width: 90%; height: 80px; padding: 12px; margin: 15px 0; border-radius: 10px; border: 1px solid var(--input-border); background: var(--input-bg); color: var(--text-color); font-size: 16px; resize: none; font-family: inherit; }
        button.main-btn { background: #ff8a65; color: white; border: none; padding: 12px 30px; border-radius: 10px; font-size: 16px; cursor: pointer; font-weight: bold; transition: 0.3s; width: 80%; }
        button.main-btn:active { background: #e67c5c; transform: scale(0.95); }
        .btn-clear { background: var(--input-bg); color: var(--sub-text); border: 1px solid var(--input-border); padding: 8px 15px; font-size: 12px; margin-top: 15px; border-radius: 8px; cursor: pointer;}
        
        /* 🎯 进阶二：目标进度条样式 */
        .progress-container { width: 100%; background: var(--input-border); border-radius: 10px; height: 12px; margin: 15px 0; overflow: hidden; }
        .progress-bar { height: 100%; background: #4caf50; width: 0%; transition: width 0.5s ease-in-out; }
        .progress-text { font-size: 12px; color: var(--sub-text); margin-bottom: 5px; text-align: left; }

        .stats { display: flex; justify-content: space-around; margin-top: 25px; gap: 10px; }
        .stat-box { background: var(--box-bg); padding: 15px 5px; border-radius: 15px; width: 23%; font-size: 14px; transition: 0.3s; }
        .stat-val { font-size: 20px; font-weight: bold; color: #e65100; margin: 5px 0; display: block; }
        
        #msg { margin-top: 15px; font-size: 15px; color: #ff8a65; font-weight: bold; min-height: 20px; background: var(--box-bg); padding: 10px; border-radius: 10px; display: none; line-height: 1.5; }
        #loading { color: var(--sub-text); font-size: 14px; margin-top: 10px; display: none; }
        .chart-container { width: 180px; height: 180px; margin: 20px auto; position: relative; }
        hr { border: none; border-top: 1px dashed var(--hr-color); margin: 25px 0; }

        /* 🍽️ 进阶一：流水账列表样式 */
        .log-list { text-align: left; margin-top: 15px; max-height: 200px; overflow-y: auto; padding-right: 5px; }
        .log-item { background: var(--input-bg); border: 1px solid var(--input-border); padding: 10px; border-radius: 8px; margin-bottom: 8px; font-size: 14px; display: flex; justify-content: space-between; align-items: center;}
        .log-time { color: var(--sub-text); font-size: 12px; margin-right: 10px;}
        .del-btn { color: #f44336; background: none; border: none; font-weight: bold; cursor: pointer; padding: 5px;}
    </style>
</head>
<body>
    <div class="card">
        <div class="header-actions">
            <button class="icon-btn" onclick="toggleDarkMode()" id="themeIcon">🌙</button>
        </div>

        <h2>✨ AI 智能营养追踪器</h2>
        <p style="color: var(--sub-text); font-size: 14px;">每天进步一点点，向着目标冲刺！</p>
        
        <div class="progress-text">🔥 今日卡路里目标: <span id="cal-current">0</span> / <span id="cal-target">2200</span> kcal</div>
        <div class="progress-container">
            <div class="progress-bar" id="cal-progress"></div>
        </div>

        <textarea id="foodInput" placeholder="今天吃了什么好吃的？比如：中午吃了一碗大盘鸡加拉面..."></textarea>
        <br>
        <button class="main-btn" onclick="analyzeFood()">✨ 记录这一顿</button>
        <div id="loading">🧠 AI 正在疯狂计算中...</div>
        <div id="msg"></div>

        <hr>
        <h3 style="color: var(--text-color); font-size: 16px;">📊 今日摄入雷达</h3>
        
        <div class="chart-container">
            <canvas id="macroChart"></canvas>
        </div>
        
        <div class="stats">
            <div class="stat-box">🔥 热量<span class="stat-val" id="tot-cal">0</span></div>
            <div class="stat-box">🥩 蛋白<span class="stat-val" id="tot-pro">0</span></div>
            <div class="stat-box">🍞 碳水<span class="stat-val" id="tot-car">0</span></div>
            <div class="stat-box">🧈 脂肪<span class="stat-val" id="tot-fat">0</span></div>
        </div>

        <hr>
        <h3 style="color: var(--text-color); font-size: 16px;">🍽️ 今日饮食日记</h3>
        <div class="log-list" id="log-container"></div>

        <button class="btn-clear" onclick="clearData()">🔄 开启新一天 (清空记录)</button>
    </div>

    <script>
        const DEEPSEEK_API_KEY = "sk-77af62e87d2d4423b8f8a4a0a4a53760"; 
        
        // 记忆芯片：除了总数，还要记住每一笔流水账 (logs) 和深色模式状态
        let nutritionData = JSON.parse(localStorage.getItem('mouse_nutrition_v2')) || { 
            cal: 0, pro: 0, car: 0, fat: 0, logs: [] 
        };
        const TARGET_CAL = 2200; // 目标卡路里可以随时在这里改
        let macroChart;

        // 页面加载初始化
        window.onload = function() {
            if(localStorage.getItem('mouse_darkmode') === 'true') {
                document.body.classList.add('dark-mode');
                document.getElementById('themeIcon').innerText = '☀️';
            }
            updateUI();
            initChart();
        }

        // 🌙 深夜模式切换逻辑
        function toggleDarkMode() {
            const body = document.body;
            body.classList.toggle('dark-mode');
            const isDark = body.classList.contains('dark-mode');
            localStorage.setItem('mouse_darkmode', isDark);
            document.getElementById('themeIcon').innerText = isDark ? '☀️' : '🌙';
        }

        async function analyzeFood() {
            const text = document.getElementById('foodInput').value;
            if (!text) return alert("❌ 还没告诉我吃了什么呢！");
            
            document.getElementById('loading').style.display = 'block';
            document.getElementById('msg').style.display = 'none';

            const prompt = `你是一个专业的营养师。用户刚刚吃下了这些食物：${text}。
            请估算总卡路里(kcal)、蛋白质(g)、碳水(g)和脂肪(g)。
            请严格返回JSON格式，不要有任何文字或Markdown标记。格式如下：
            {"cal": 120, "pro": 10.5, "car": 20, "fat": 5, "msg": "一句可爱的鼓励语"}`;

            try {
                const response = await fetch("https://api.mousefries.top/chat/completions", {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${DEEPSEEK_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: "deepseek-chat",
                        messages: [
                            {"role": "system", "content": "你是一个输出纯JSON格式的营养师。"},
                            {"role": "user", "content": prompt}
                        ],
                        response_format: { type: "json_object" }
                    })
                });
                
                if (!response.ok) throw new Error("API 请求失败");

                const data = await response.json();
                let resultText = data.choices[0].message.content;
                resultText = resultText.replace(/```json/g, '').replace(/```/g, '').trim();
                const result = JSON.parse(resultText);

                // 累加数据
                nutritionData.cal += result.cal; 
                nutritionData.pro += result.pro; 
                nutritionData.car += result.car; 
                nutritionData.fat += result.fat;

                // 🍽️ 进阶一：生成一条时间戳日记并保存
                const now = new Date();
                const timeStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
                // 截取前10个字作为摘要
                const summary = text.length > 10 ? text.substring(0, 10) + "..." : text; 
                nutritionData.logs.unshift({ // 插在最前面
                    id: Date.now(),
                    time: timeStr,
                    text: summary,
                    cal: result.cal,
                    pro: result.pro, car: result.car, fat: result.fat
                });

                saveData();
                updateUI();

                document.getElementById('msg').innerHTML = `💡 <b>营养师说：</b><br>${result.msg}`;
                document.getElementById('msg').style.display = 'block';
                document.getElementById('foodInput').value = ''; 
            } catch (e) {
                alert("🚧 哎呀，网络通道堵车了！");
                console.error(e);
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        // 删除单条流水账记录
        function deleteLog(id) {
            const index = nutritionData.logs.findIndex(log => log.id === id);
            if(index > -1) {
                const log = nutritionData.logs[index];
                // 扣除对应热量（避免出现负数导致图表崩坏，用 Math.max）
                nutritionData.cal = Math.max(0, nutritionData.cal - log.cal);
                nutritionData.pro = Math.max(0, nutritionData.pro - log.pro);
                nutritionData.car = Math.max(0, nutritionData.car - log.car);
                nutritionData.fat = Math.max(0, nutritionData.fat - log.fat);
                
                nutritionData.logs.splice(index, 1); // 删掉这条记录
                saveData();
                updateUI();
            }
        }

        function saveData() {
            localStorage.setItem('mouse_nutrition_v2', JSON.stringify(nutritionData));
        }

        function updateUI() {
            // 更新四大金刚数字
            document.getElementById('tot-cal').innerText = nutritionData.cal.toFixed(1);
            document.getElementById('tot-pro').innerText = nutritionData.pro.toFixed(1);
            document.getElementById('tot-car').innerText = nutritionData.car.toFixed(1);
            document.getElementById('tot-fat').innerText = nutritionData.fat.toFixed(1);
            
            // 🎯 进阶二：更新目标进度条
            document.getElementById('cal-current').innerText = nutritionData.cal.toFixed(0);
            let percent = (nutritionData.cal / TARGET_CAL) * 100;
            if (percent > 100) percent = 100;
            const bar = document.getElementById('cal-progress');
            bar.style.width = percent + '%';
            // 超标变红警告，达标变绿
            if(percent >= 100) bar.style.background = '#f44336';
            else if(percent > 80) bar.style.background = '#ff9800';
            else bar.style.background = '#4caf50';

            // 更新流水账列表
            const logBox = document.getElementById('log-container');
            logBox.innerHTML = '';
            if(nutritionData.logs.length === 0) {
                logBox.innerHTML = '<p style="color:var(--sub-text); font-size: 13px; text-align:center;">今天还没有吃东西呢~</p>';
            } else {
                nutritionData.logs.forEach(log => {
                    logBox.innerHTML += `
                        <div class="log-item">
                            <div>
                                <span class="log-time">${log.time}</span>
                                <span>${log.text} <span style="color:#ff8a65; font-weight:bold;">(+${log.cal}kcal)</span></span>
                            </div>
                            <button class="del-btn" onclick="deleteLog(${log.id})">✖</button>
                        </div>
                    `;
                });
            }

            // 更新图表
            if (macroChart) {
                macroChart.data.datasets[0].data = [nutritionData.pro, nutritionData.car, nutritionData.fat];
                macroChart.update();
            }
        }

        function initChart() {
            const ctx = document.getElementById('macroChart').getContext('2d');
            macroChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['蛋白质', '碳水', '脂肪'],
                    datasets: [{
                        data: [nutritionData.pro, nutritionData.car, nutritionData.fat],
                        backgroundColor: ['#4caf50', '#ff9800', '#f44336'],
                        borderWidth: 0,
                        hoverOffset: 4
                    }]
                },
                options: { responsive: true, cutout: '70%', plugins: { legend: { display: false } } }
            });
        }

        function clearData() {
            if(confirm("确定要清空今天的记录，迎接崭新的一天吗？")) {
                nutritionData = { cal: 0, pro: 0, car: 0, fat: 0, logs: [] };
                saveData();
                updateUI();
                document.getElementById('msg').style.display = 'none';
            }
        }
    </script>
</body>
</html>
