<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>领地战 Color Wars V3</title>
    <style>
        /* 🌌 苹果风深邃背景 */
        body {
            margin: 0; padding: 0; height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background: #1c1c1e;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            user-select: none; -webkit-user-select: none; color: white;
            overflow: hidden;
        }

        /* 顶部状态栏 */
        #status-bar {
            width: 90%; max-width: 450px; padding: 12px 20px; border-radius: 16px;
            text-align: center; font-size: 1.2rem; font-weight: bold;
            margin-bottom: 20px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            transition: background-color 0.4s ease;
            box-sizing: border-box;
        }

        /* 🔲 核心修复：自适应正方形棋盘 */
        #board-container {
            width: 95vw; max-width: 450px; /* 完美适配手机和 iPad */
            aspect-ratio: 1 / 1; /* 强制绝对正方形 */
            background: rgba(40, 40, 45, 0.8);
            border-radius: 20px;
            padding: 10px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), inset 0 1px 1px rgba(255,255,255,0.1);
            box-sizing: border-box;
        }

        #board {
            display: grid; 
            grid-template-columns: repeat(6, 1fr); 
            grid-template-rows: repeat(6, 1fr);
            gap: 6px; width: 100%; height: 100%;
        }

        /* 单个格子：不再被内容撑开 */
        .cell {
            background: rgba(255,255,255,0.06); 
            border-radius: 12px;
            position: relative; /* 绝对定位的基准 */
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.1s;
        }
        .cell:active { transform: scale(0.92); }

        /* 🔴 核心修复：棋子绝对定位，丝滑位移 */
        .dot {
            position: absolute;
            width: 30px; height: 30px;
            margin-top: -15px; margin-left: -15px; /* 居中偏移 */
            display: flex; justify-content: center; align-items: center;
            font-size: 24px;
            /* 苹果果冻回弹曲线 */
            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform: scale(0); opacity: 0;
            pointer-events: none; /* 防止点击到棋子导致 Bug */
        }
        .dot.show { transform: scale(1); opacity: 1; }

        /* 颜色定义 (高饱和度更清晰) */
        .color-0 { background-color: #FFCC00 !important; color: #000; }
        .color-1 { background-color: #0A84FF !important; color: #fff; }
        .color-2 { background-color: #30D158 !important; color: #000; }
        .color-3 { background-color: #FF453A !important; color: #fff; }
        
        /* 隐藏设置面板，简化展示 */
        #setup-screen { display: none; } 
    </style>
</head>
<body>

    <div id="status-bar" class="color-0">🟡 黄方回合</div>
    <div id="board-container"><div id="board"></div></div>

    <script>
        const ROWS = 6, COLS = 6;
        let currentPlayer = 0;
        let grid = [];
        let isAnimating = false;
        
        // 记录每个玩家是不是第一次点击 (第一次点击生成 3 个)
        let firstMove = [true, true, true, true];
        
        const currentSkin = ['🟡', '🔵', '🟢', '🔴'];

        function initBoard() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            grid = [];
            for (let r = 0; r < ROWS; r++) {
                let row = [];
                for (let c = 0; c < COLS; c++) {
                    const cellEl = document.createElement('div');
                    cellEl.className = 'cell';
                    cellEl.onclick = () => handleCellClick(r, c);
                    boardEl.appendChild(cellEl);
                    row.push({ 
                        player: null, 
                        dots: 0, 
                        element: cellEl, 
                        limit: getLimit(r, c),
                        dotElements: [] // 保存棋子的 DOM 元素，用于平滑动画
                    });
                }
                grid.push(row);
            }
            updateUI();
        }

        function getLimit(r, c) {
            let limit = 4;
            if (r === 0 || r === ROWS - 1) limit--;
            if (c === 0 || c === COLS - 1) limit--;
            return limit;
        }

        async function handleCellClick(r, c) {
            if (isAnimating) return;
            const cell = grid[r][c];

            // 只能点空位，或者自己的位子
            if (cell.player !== null && cell.player !== currentPlayer) return;

            // 核心规则：如果是该玩家的第一次点击，直接加 3 个；否则加 1 个
            let dotsToAdd = firstMove[currentPlayer] ? 3 : 1;
            firstMove[currentPlayer] = false; // 用掉第一次机会

            cell.player = currentPlayer;
            
            // 逐个添加棋子，避免直接撑爆
            for(let i = 0; i < dotsToAdd; i++) {
                cell.dots++;
                renderCell(r, c);
            }

            isAnimating = true;
            await checkExplosions();
            
            if(!checkWin()) {
                currentPlayer = (currentPlayer + 1) % 4;
                updateUI();
                isAnimating = false;
            }
        }

        function renderCell(r, c) {
            const cell = grid[r][c];
            const el = cell.element;

            // 更新格子颜色
            if (cell.dots > 0) {
                el.className = `cell color-${cell.player}`;
            } else {
                el.className = 'cell'; 
            }

            // 如果需要的棋子比现有的多，就创建新棋子
            while (cell.dotElements.length < cell.dots) {
                const dot = document.createElement('div');
                dot.className = 'dot';
                el.appendChild(dot);
                // 强制重绘后添加 show 类，触发果冻弹窗动画
                requestAnimationFrame(() => {
                    requestAnimationFrame(() => dot.classList.add('show'));
                });
                cell.dotElements.push(dot);
            }

            // 如果需要的棋子比现有的少（比如爆炸了），就移除
            while (cell.dotElements.length > cell.dots) {
                const dot = cell.dotElements.pop();
                dot.classList.remove('show');
                setTimeout(() => dot.remove(), 300); // 等动画播完再删 DOM
            }

            // 更新所有棋子的图标和丝滑排列位置
            const positions = getPositions(cell.dots);
            cell.dotElements.forEach((dot, index) => {
                dot.innerText = currentSkin[cell.player];
                if (positions[index]) {
                    dot.style.left = positions[index].left;
                    dot.style.top = positions[index].top;
                }
            });
        }

        // 核心视觉优化：根据棋子数量计算优美的排列位置 (像骰子一样)
        function getPositions(count) {
            if (count === 1) return [{ left: '50%', top: '50%' }];
            if (count === 2) return [{ left: '35%', top: '35%' }, { left: '65%', top: '65%' }];
            if (count === 3) return [{ left: '50%', top: '25%' }, { left: '30%', top: '70%' }, { left: '70%', top: '70%' }];
            if (count >= 4) return [{ left: '30%', top: '30%' }, { left: '70%', top: '30%' }, { left: '30%', top: '70%' }, { left: '70%', top: '70%' }];
            return [];
        }

        async function checkExplosions() {
            let exploding = true;
            while (exploding) {
                exploding = false;
                let toExplode = [];
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        if (grid[r][c].dots >= grid[r][c].limit) {
                            toExplode.push({r, c, player: grid[r][c].player});
                        }
                    }
                }

                if (toExplode.length > 0) {
                    exploding = true;
                    await new Promise(resolve => setTimeout(resolve, 250)); // 爆炸节奏延迟
                    
                    for (let t of toExplode) {
                        grid[t.r][t.c].dots -= grid[t.r][t.c].limit;
                        if (grid[t.r][t.c].dots === 0) grid[t.r][t.c].player = null;
                        renderCell(t.r, t.c);

                        // 向四周蔓延
                        const neighbors = [[t.r-1, t.c], [t.r+1, t.c], [t.r, t.c-1], [t.r, t.c+1]];
                        for (let n of neighbors) {
                            const nr = n[0], nc = n[1];
                            if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
                                grid[nr][nc].player = t.player;
                                grid[nr][nc].dots++;
                                renderCell(nr, nc);
                            }
                        }
                    }
                }
            }
        }

        function checkWin() {
            let totalDots = 0;
            let activePlayers = new Set();
            for(let r=0; r<ROWS; r++) {
                for(let c=0; c<COLS; c++) {
                    if(grid[r][c].player !== null) {
                        totalDots++;
                        activePlayers.add(grid[r][c].player);
                    }
                }
            }
            // 排除第一轮刚开始的误判
            if(totalDots > 4 && activePlayers.size === 1) {
                const winnerId = Array.from(activePlayers)[0];
                document.getElementById('status-bar').innerText = `🏆 游戏结束！${currentSkin[winnerId]} 获胜！`;
                return true;
            }
            return false;
        }

        function updateUI() {
            const bar = document.getElementById('status-bar');
            bar.className = `color-${currentPlayer}`;
            bar.innerText = `👉 轮到 ${currentSkin[currentPlayer]} 方`;
        }

        // 启动
        initBoard();
    </script>
</body>
</html>
