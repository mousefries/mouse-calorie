<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>领地战 Color Wars 终极版</title>
    <style>
        /* 🌌 苹果风深邃背景 */
        body {
            margin: 0; padding: 0; height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background: linear-gradient(135deg, #1c1c1e 0%, #2c2c34 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            user-select: none; -webkit-user-select: none; color: white;
            overflow: hidden;
        }

        /* 📋 赛前设置大厅 (毛玻璃) */
        #setup-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 50; transition: opacity 0.4s ease;
        }
        .setup-card {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
            padding: 30px; border-radius: 28px; width: 85%; max-width: 400px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
        }
        .setup-row {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        select {
            background: rgba(0,0,0,0.4); color: white; border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 12px; border-radius: 12px; font-size: 1rem; outline: none;
        }
        .start-btn {
            width: 100%; margin-top: 20px; padding: 16px; font-size: 1.2rem; font-weight: bold;
            background: #30D158; color: white; border: none; border-radius: 16px; 
            cursor: pointer; transition: 0.2s; box-shadow: 0 10px 20px rgba(48, 209, 88, 0.4);
        }
        .start-btn:active { transform: scale(0.95); }

        /* 🎮 游戏主界面 */
        #status-bar {
            width: 90%; max-width: 450px; padding: 12px 20px; border-radius: 16px;
            text-align: center; font-size: 1.2rem; font-weight: bold;
            margin-bottom: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            transition: 0.4s ease; box-sizing: border-box; text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        #board-container {
            width: 95vw; max-width: 450px; aspect-ratio: 1 / 1; 
            background: rgba(40, 40, 45, 0.8); border-radius: 24px; padding: 8px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.1);
            box-sizing: border-box;
        }
        #board {
            display: grid; grid-template-columns: repeat(6, 1fr); grid-template-rows: repeat(6, 1fr);
            gap: 6px; width: 100%; height: 100%;
        }

        /* 🔲 单个格子 (绝对定位基础) */
        .cell {
            background: rgba(255,255,255,0.06); border-radius: 14px;
            position: relative; cursor: pointer;
            transition: background-color 0.3s ease, transform 0.1s;
        }
        .cell:active { transform: scale(0.92); }

        /* 🔴 棋子：绝对定位 + 果冻回弹动画 */
        .dot {
            position: absolute; width: 30px; height: 30px;
            margin-top: -15px; margin-left: -15px; 
            display: flex; justify-content: center; align-items: center; font-size: 24px;
            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform: scale(0); opacity: 0; pointer-events: none; 
        }
        .dot.show { transform: scale(1); opacity: 1; }

        /* 阵营高亮颜色 */
        .color-0 { background-color: #FFCC00 !important; color: #000; }
        .color-1 { background-color: #0A84FF !important; color: #fff; }
        .color-2 { background-color: #30D158 !important; color: #000; }
        .color-3 { background-color: #FF453A !important; color: #fff; }
    </style>
</head>
<body>

    <div id="setup-screen">
        <div class="setup-card">
            <h2 style="text-align: center; margin-top: 0; margin-bottom: 25px;">⚔️ 领地战配置</h2>
            
            <div class="setup-row">
                <span style="font-weight: bold;">🎨 棋子皮肤：</span>
                <select id="skin-select">
                    <option value="0">经典纯色 🟡🔵🟢🔴</option>
                    <option value="1">疯狂动物 🐹🐱🐶🐰</option>
                    <option value="2">快乐大餐 🍟🍕🍔🥤</option>
                    <option value="3">元素魔法 ⚡️💧🍃🔥</option>
                </select>
            </div>

            <div id="players-config"></div>

            <button class="start-btn" onclick="startGame()">开始战斗 🔥</button>
        </div>
    </div>

    <div id="status-bar" style="display: none;"></div>
    <div id="board-container" style="display: none;"><div id="board"></div></div>

    <script>
        const ROWS = 6, COLS = 6;
        let grid = [];
        let isAnimating = false;
        let gameEnded = false;
        
        let players = []; 
        let currentPlayerIndex = 0; 
        
        // 每个玩家是否是首回合（首回合下 3 个）
        let firstMove = {}; 
        
        const skins = [
            ['🟡', '🔵', '🟢', '🔴'],
            ['🐹', '🐱', '🐶', '🐰'],
            ['🍟', '🍕', '🍔', '🥤'],
            ['⚡️', '💧', '🍃', '🔥']
        ];
        let currentSkin = skins[0];

        // 初始化设置大厅
        function initSetup() {
            const container = document.getElementById('players-config');
            const colors = ['🟡 1号', '🔵 2号', '🟢 3号', '🔴 4号'];
            for(let i=0; i<4; i++) {
                container.innerHTML += `
                    <div class="setup-row">
                        <span style="font-weight:bold;">${colors[i]}方：</span>
                        <select id="p${i}-type">
                            <option value="human">👤 人类</option>
                            <option value="ai-easy">🤖 AI (智障)</option>
                            <option value="ai-medium">🤖 AI (普通)</option>
                            <option value="ai-hard">🧠 AI (深思)</option>
                            ${i > 1 ? '<option value="none">❌ 关闭</option>' : ''}
                        </select>
                    </div>
                `;
            }
        }

        function startGame() {
            currentSkin = skins[document.getElementById('skin-select').value];
            players = [];
            firstMove = {};
            
            for(let i=0; i<4; i++) {
                const val = document.getElementById(`p${i}-type`).value;
                if(val !== 'none') {
                    players.push({ id: i, type: val.split('-')[0], diff: val.split('-')[1] || null });
                    firstMove[i] = true; // 记录初始首回合状态
                }
            }

            document.getElementById('setup-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('setup-screen').style.display = 'none';
                document.getElementById('status-bar').style.display = 'block';
                document.getElementById('board-container').style.display = 'block';
                initBoard();
            }, 400);
        }

        function initBoard() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            grid = [];
            for (let r = 0; r < ROWS; r++) {
                let row = [];
                for (let c = 0; c < COLS; c++) {
                    const cellEl = document.createElement('div');
                    cellEl.className = 'cell';
                    cellEl.onclick = () => handleCellClick(r, c, true);
                    boardEl.appendChild(cellEl);
                    row.push({ 
                        player: null, dots: 0, limit: getLimit(r, c),
                        element: cellEl, dotElements: [] 
                    });
                }
                grid.push(row);
            }
            currentPlayerIndex = 0;
            gameEnded = false;
            updateUI();
            checkAITurn(); // 如果1号玩家是AI，直接开始
        }

        function getLimit(r, c) {
            let limit = 4;
            if (r === 0 || r === ROWS - 1) limit--;
            if (c === 0 || c === COLS - 1) limit--;
            return limit;
        }

        // 检查某个玩家是否还活着
        function isPlayerAlive(pid) {
            if (firstMove[pid]) return true; // 还没下过首回合，算活着
            for(let r=0; r<ROWS; r++) {
                for(let c=0; c<COLS; c++) {
                    if(grid[r][c].player === pid) return true;
                }
            }
            return false;
        }

        async function handleCellClick(r, c, isHumanAction) {
            if (isAnimating || gameEnded) return;
            const p = players[currentPlayerIndex];
            
            if (isHumanAction && p.type !== 'human') return; // 人类不能帮AI下

            const cell = grid[r][c];
            if (cell.player !== null && cell.player !== p.id) return; // 只能下空位或自己的

            // 首回合下 3 个，之后下 1 个
            let dotsToAdd = firstMove[p.id] ? 3 : 1;
            firstMove[p.id] = false; 

            cell.player = p.id;
            for(let i = 0; i < dotsToAdd; i++) {
                cell.dots++;
                renderCell(r, c);
            }

            isAnimating = true;
            await checkExplosions();
            
            if(!checkWin()) {
                nextTurn();
            }
        }

        // 寻找下一个活着的玩家
        function nextTurn() {
            let loopCount = 0;
            do {
                currentPlayerIndex = (currentPlayerIndex + 1) % players.length;
                loopCount++;
                if(loopCount > 10) break; // 防死循环
            } while(!isPlayerAlive(players[currentPlayerIndex].id));

            updateUI();
            isAnimating = false;
            checkAITurn(); // 轮转后，如果是AI就触发
        }

        function renderCell(r, c) {
            const cell = grid[r][c];
            const el = cell.element;

            el.className = cell.dots > 0 ? `cell color-${cell.player}` : 'cell';

            // 增加新棋子
            while (cell.dotElements.length < cell.dots) {
                const dot = document.createElement('div');
                dot.className = 'dot';
                el.appendChild(dot);
                requestAnimationFrame(() => requestAnimationFrame(() => dot.classList.add('show')));
                cell.dotElements.push(dot);
            }
            // 移除炸掉的棋子
            while (cell.dotElements.length > cell.dots) {
                const dot = cell.dotElements.pop();
                dot.classList.remove('show');
                setTimeout(() => dot.remove(), 300);
            }

            // 更新棋子位置和皮肤
            const positions = getPositions(cell.dots);
            cell.dotElements.forEach((dot, index) => {
                dot.innerText = currentSkin[cell.player];
                if (positions[index]) {
                    dot.style.left = positions[index].left;
                    dot.style.top = positions[index].top;
                }
            });
        }

        function getPositions(count) {
            if (count === 1) return [{ left: '50%', top: '50%' }];
            if (count === 2) return [{ left: '35%', top: '35%' }, { left: '65%', top: '65%' }];
            if (count === 3) return [{ left: '50%', top: '25%' }, { left: '30%', top: '70%' }, { left: '70%', top: '70%' }];
            if (count >= 4) return [{ left: '30%', top: '30%' }, { left: '70%', top: '30%' }, { left: '30%', top: '70%' }, { left: '70%', top: '70%' }];
            return [];
        }

        async function checkExplosions() {
            let exploding = true;
            while (exploding) {
                exploding = false;
                let toExplode = [];
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        if (grid[r][c].dots >= grid[r][c].limit) {
                            toExplode.push({r, c, player: grid[r][c].player});
                        }
                    }
                }

                if (toExplode.length > 0) {
                    exploding = true;
                    await new Promise(resolve => setTimeout(resolve, 250)); 
                    
                    for (let t of toExplode) {
                        grid[t.r][t.c].dots -= grid[t.r][t.c].limit;
                        if (grid[t.r][t.c].dots === 0) grid[t.r][t.c].player = null;
                        renderCell(t.r, t.c);

                        const neighbors = [[t.r-1, t.c], [t.r+1, t.c], [t.r, t.c-1], [t.r, t.c+1]];
                        for (let n of neighbors) {
                            const nr = n[0], nc = n[1];
                            if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
                                grid[nr][nc].player = t.player;
                                grid[nr][nc].dots++;
                                renderCell(nr, nc);
                            }
                        }
                    }
                }
            }
        }

        // --- 核心 AI 系统 ---
        async function checkAITurn() {
            const p = players[currentPlayerIndex];
            if (p.type !== 'ai' || gameEnded) return;
            
            isAnimating = true; 
            // 延时假装思考，也方便观战
            await new Promise(resolve => setTimeout(resolve, 700)); 

            let validMoves = [];
            for(let r=0; r<ROWS; r++) {
                for(let c=0; c<COLS; c++) {
                    if(grid[r][c].player === null || grid[r][c].player === p.id) validMoves.push({r, c});
                }
            }
            if(validMoves.length === 0) return;
            let move;

            if (p.diff === 'easy') {
                move = validMoves[Math.floor(Math.random() * validMoves.length)];
            } 
            else if (p.diff === 'medium') {
                validMoves.sort((a,b) => (grid[a.r][a.c].limit - grid[a.r][a.c].dots) - (grid[b.r][b.c].limit - grid[b.r][b.c].dots));
                move = validMoves[0];
            } 
            else {
                let bestScore = -9999;
                for (let m of validMoves) {
                    let score = 0;
                    let cell = grid[m.r][m.c];
                    let willExplode = (cell.dots + (firstMove[p.id] ? 3 : 1)) >= cell.limit;
                    
                    if (willExplode) score += 100;
                    if (cell.limit === 2) score += 20; 
                    if (cell.limit === 3) score += 5;
                    
                    const neighbors = [[m.r-1, m.c], [m.r+1, m.c], [m.r, m.c-1], [m.r, m.c+1]];
                    for (let n of neighbors) {
                        const nr = n[0], nc = n[1];
                        if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
                            let nCell = grid[nr][nc];
                            if (nCell.player !== null && nCell.player !== p.id && nCell.dots + 1 === nCell.limit) {
                                score -= 50; 
                            }
                        }
                    }
                    score += Math.random() * 5; 
                    if (score > bestScore) { bestScore = score; move = m; }
                }
            }

            isAnimating = false; 
            handleCellClick(move.r, move.c, false);
        }

        function checkWin() {
            let activeCount = 0;
            let lastAlive = null;
            players.forEach(p => {
                if(isPlayerAlive(p.id)) { activeCount++; lastAlive = p.id; }
            });

            // 如果有人被吃光了，且场上只剩一人，则游戏结束
            if(activeCount === 1) {
                gameEnded = true;
                document.getElementById('status-bar').innerText = `🏆 结束！${currentSkin[lastAlive]} 获胜！`;
                // 给个重新开始的按钮
                setTimeout(() => {
                    document.getElementById('setup-screen').style.display = 'flex';
                    requestAnimationFrame(() => document.getElementById('setup-screen').style.opacity = '1');
                }, 2000);
                return true;
            }
            return false;
        }

        function updateUI() {
            const bar = document.getElementById('status-bar');
            const p = players[currentPlayerIndex];
            bar.className = `color-${p.id}`;
            let typeName = p.type === 'human' ? '人类' : 'AI';
            bar.innerText = `👉 轮到 ${currentSkin[p.id]} 方 (${typeName})`;
        }

        initSetup();
    </script>
</body>
</html>
