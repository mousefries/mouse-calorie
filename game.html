<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>领地战 联机版 ✨</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
    <style>
        /* 🌌 苹果风深邃背景 */
        body { margin: 0; padding: 0; height: 100vh; font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: linear-gradient(135deg, #1c1c1e 0%, #2c2c34 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; user-select: none; -webkit-user-select: none; color: white; overflow: hidden; }

        /* 📋 模态框通用样式 */
        .modal-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 50; transition: opacity 0.4s ease; }
        .modal-card { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); padding: 30px; border-radius: 28px; width: 85%; max-width: 400px; box-shadow: 0 30px 60px rgba(0,0,0,0.6); text-align: center; }
        
        .btn { width: 100%; padding: 16px; font-size: 1.2rem; font-weight: bold; border: none; border-radius: 16px; cursor: pointer; transition: 0.2s; margin-top: 15px; color: white;}
        .btn:active { transform: scale(0.95); }
        .btn-host { background: #0A84FF; box-shadow: 0 10px 20px rgba(10, 132, 255, 0.4); }
        .btn-join { background: #30D158; box-shadow: 0 10px 20px rgba(48, 209, 88, 0.4); }
        .btn-local { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); }

        input { width: 90%; padding: 15px; border-radius: 12px; border: none; font-size: 1.5rem; text-align: center; font-weight: bold; margin-top: 15px; background: rgba(0,0,0,0.5); color: #FFCC00; outline: none; text-transform: uppercase; }

        /* 🎮 游戏主界面 */
        #status-bar { width: 90%; max-width: 450px; padding: 12px 20px; border-radius: 16px; text-align: center; font-size: 1.2rem; font-weight: bold; margin-bottom: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.3); transition: 0.4s ease; }
        #board-container { width: 95vw; max-width: 450px; aspect-ratio: 1 / 1; background: rgba(40, 40, 45, 0.8); border-radius: 24px; padding: 8px; box-sizing: border-box; }
        #board { display: grid; grid-template-columns: repeat(6, 1fr); grid-template-rows: repeat(6, 1fr); gap: 6px; width: 100%; height: 100%; }
        .cell { background: rgba(255,255,255,0.06); border-radius: 14px; position: relative; cursor: pointer; transition: transform 0.1s; }
        .cell:active { transform: scale(0.92); }
        .dot { position: absolute; width: 30px; height: 30px; margin-top: -15px; margin-left: -15px; display: flex; justify-content: center; align-items: center; font-size: 24px; transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1); transform: scale(0); opacity: 0; pointer-events: none; }
        .dot.show { transform: scale(1); opacity: 1; }

        /* 颜色 */
        .color-0 { background-color: #FFCC00 !important; color: #000; }
        .color-1 { background-color: #0A84FF !important; color: #fff; }
    </style>
</head>
<body>

    <div id="lobby-screen" class="modal-overlay">
        <div class="modal-card">
            <h2 style="margin-top: 0;">🌐 领地战网络大厅</h2>
            <p style="color: rgba(255,255,255,0.6); font-size: 0.9rem;">1v1 双人异地直连模式</p>
            
            <button class="btn btn-host" onclick="createRoom()">🏠 创建房间 (做主机)</button>
            <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 25px 0;">
            <input type="text" id="room-input" placeholder="输入房间号" maxlength="4">
            <button class="btn btn-join" onclick="joinRoom()">🚀 加入房间</button>
            
            <div id="net-status" style="margin-top: 20px; color: #FFCC00; font-weight: bold;"></div>
        </div>
    </div>

    <div id="status-bar" style="display: none;"></div>
    <div id="board-container" style="display: none;"><div id="board"></div></div>

    <script>
        const ROWS = 6, COLS = 6;
        let grid = [], isAnimating = false;
        let currentPlayerIndex = 0; 
        let firstMove = {0: true, 1: true}; 
        
        // --- 🌐 核心网络变量 ---
        let peer = null;
        let conn = null;
        let myNetworkId = null; // 0代表黄方(主机)，1代表蓝方(客机)
        let isOnlineMode = false;

        // 生成随机4位房间号
        function generateRoomCode() {
            return Math.floor(1000 + Math.random() * 9000).toString();
        }

        // 🏠 1. 创建房间 (主机)
        function createRoom() {
            const statusEl = document.getElementById('net-status');
            statusEl.innerText = "正在开启网络对讲机...";
            
            const roomCode = "MOUSE" + generateRoomCode(); // 加上前缀防止冲突
            
            // 初始化 Peer (连接到免费公用信令服务器)
            peer = new Peer(roomCode);

            peer.on('open', (id) => {
                const displayCode = id.replace('MOUSE', '');
                statusEl.innerHTML = `房间创建成功！<br><span style="font-size:2rem; color:white;">${displayCode}</span><br>等待朋友加入...`;
            });

            // 等待朋友连入
            peer.on('connection', (connection) => {
                conn = connection;
                setupConnection(0); // 主机永远是 0 号玩家 (黄色)
            });
            
            peer.on('error', (err) => { statusEl.innerText = "网络错误: " + err.type; });
        }

        // 🚀 2. 加入房间 (客机)
        function joinRoom() {
            const input = document.getElementById('room-input').value.trim();
            const statusEl = document.getElementById('net-status');
            if(input.length !== 4) { statusEl.innerText = "请输入4位房间号！"; return; }

            statusEl.innerText = "正在寻找房间...";
            peer = new Peer(); // 随便生成一个自己的ID

            peer.on('open', () => {
                // 主动去连接主机
                conn = peer.connect("MOUSE" + input);
                conn.on('open', () => {
                    setupConnection(1); // 客机永远是 1 号玩家 (蓝色)
                });
            });
            peer.on('error', (err) => { statusEl.innerText = "未找到房间或网络错误！"; });
        }

        // 🔌 3. 设置网络对讲机通道
        function setupConnection(myId) {
            myNetworkId = myId;
            isOnlineMode = true;
            
            document.getElementById('net-status').innerText = "连接成功！即将进入战场...";
            
            // 接收对方传来的消息 (对方点在哪了)
            conn.on('data', (data) => {
                if(data.type === 'click') {
                    // 收到对方的点击指令，在本地执行 (强制跳过人类权限检测)
                    executeClick(data.r, data.c);
                }
            });

            setTimeout(() => {
                document.getElementById('lobby-screen').style.display = 'none';
                document.getElementById('status-bar').style.display = 'block';
                document.getElementById('board-container').style.display = 'block';
                initBoard();
            }, 1000);
        }

        // --- 🎮 游戏核心逻辑 (双人版) ---

        function initBoard() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = ''; grid = [];
            for (let r = 0; r < ROWS; r++) {
                let row = [];
                for (let c = 0; c < COLS; c++) {
                    const cellEl = document.createElement('div');
                    cellEl.className = 'cell';
                    // 点击时触发网络发送
                    cellEl.onclick = () => handlePlayerClick(r, c);
                    boardEl.appendChild(cellEl);
                    row.push({ player: null, dots: 0, limit: getLimit(r, c), element: cellEl, dotElements: [] });
                }
                grid.push(row);
            }
            currentPlayerIndex = 0;
            firstMove = {0: true, 1: true};
            updateUI();
        }

        function getLimit(r, c) {
            let limit = 4;
            if (r === 0 || r === ROWS - 1) limit--;
            if (c === 0 || c === COLS - 1) limit--;
            return limit;
        }

        // 玩家自己的点击动作
        function handlePlayerClick(r, c) {
            if (isAnimating) return;
            
            // 【网络权限校验】如果现在不是你的回合，绝对不准点！
            if (isOnlineMode && currentPlayerIndex !== myNetworkId) {
                // 可以加个震动提示
                return; 
            }

            const cell = grid[r][c];
            if (cell.player !== null && cell.player !== currentPlayerIndex) return; 

            // 通过网络告诉对方：“我点这个格子了！”
            if (isOnlineMode && conn) {
                conn.send({ type: 'click', r: r, c: c });
            }

            // 在自己屏幕上执行
            executeClick(r, c);
        }

        // 核心执行动画与逻辑
        async function executeClick(r, c) {
            const pId = currentPlayerIndex;
            const cell = grid[r][c];

            let dotsToAdd = firstMove[pId] ? 3 : 1;
            firstMove[pId] = false; 

            cell.player = pId;
            for(let i = 0; i < dotsToAdd; i++) {
                cell.dots++; renderCell(r, c);
            }

            isAnimating = true;
            await checkExplosions();
            
            // 简单胜利判定
            let activePlayers = new Set();
            let totalDots = 0;
            for(let row=0; row<ROWS; row++){
                for(let col=0; col<COLS; col++){
                    if(grid[row][col].dots > 0) { totalDots++; activePlayers.add(grid[row][col].player); }
                }
            }
            
            if(totalDots > 0 && activePlayers.size === 1) {
                const winner = Array.from(activePlayers)[0];
                document.getElementById('status-bar').innerText = `🏆 游戏结束！${winner === 0 ? '🟡 黄方' : '🔵 蓝方'} 获胜！`;
                isAnimating = true; // 锁定棋盘
            } else {
                currentPlayerIndex = (currentPlayerIndex + 1) % 2;
                updateUI();
                isAnimating = false;
            }
        }

        function renderCell(r, c) {
            const cell = grid[r][c];
            const el = cell.element;
            el.className = cell.dots > 0 ? `cell color-${cell.player}` : 'cell';

            while (cell.dotElements.length < cell.dots) {
                const dot = document.createElement('div');
                dot.className = 'dot'; el.appendChild(dot);
                requestAnimationFrame(() => requestAnimationFrame(() => dot.classList.add('show')));
                cell.dotElements.push(dot);
            }
            while (cell.dotElements.length > cell.dots) {
                const dot = cell.dotElements.pop();
                dot.classList.remove('show');
                setTimeout(() => dot.remove(), 300);
            }

            const positions = getPositions(cell.dots);
            cell.dotElements.forEach((dot, index) => {
                dot.innerText = cell.player === 0 ? '🟡' : '🔵';
                if (positions[index]) {
                    dot.style.left = positions[index].left; dot.style.top = positions[index].top;
                }
            });
        }

        function getPositions(count) {
            if (count === 1) return [{ left: '50%', top: '50%' }];
            if (count === 2) return [{ left: '35%', top: '35%' }, { left: '65%', top: '65%' }];
            if (count === 3) return [{ left: '50%', top: '25%' }, { left: '30%', top: '70%' }, { left: '70%', top: '70%' }];
            if (count >= 4) return [{ left: '30%', top: '30%' }, { left: '70%', top: '30%' }, { left: '30%', top: '70%' }, { left: '70%', top: '70%' }];
            return [];
        }

        async function checkExplosions() {
            let exploding = true;
            while (exploding) {
                exploding = false;
                let toExplode = [];
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        if (grid[r][c].dots >= grid[r][c].limit) toExplode.push({r, c, player: grid[r][c].player});
                    }
                }

                if (toExplode.length > 0) {
                    exploding = true;
                    await new Promise(resolve => setTimeout(resolve, 250)); 
                    for (let t of toExplode) {
                        grid[t.r][t.c].dots -= grid[t.r][t.c].limit;
                        if (grid[t.r][t.c].dots === 0) grid[t.r][t.c].player = null;
                        renderCell(t.r, t.c);
                        const neighbors = [[t.r-1, t.c], [t.r+1, t.c], [t.r, t.c-1], [t.r, t.c+1]];
                        for (let n of neighbors) {
                            const nr = n[0], nc = n[1];
                            if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
                                grid[nr][nc].player = t.player; grid[nr][nc].dots++; renderCell(nr, nc);
                            }
                        }
                    }
                }
            }
        }

        function updateUI() {
            const bar = document.getElementById('status-bar');
            bar.className = `color-${currentPlayerIndex}`;
            
            let turnText = currentPlayerIndex === 0 ? '🟡 黄方' : '🔵 蓝方';
            
            if (isOnlineMode) {
                if (currentPlayerIndex === myNetworkId) {
                    bar.innerText = `👉 你的回合 (${turnText})`;
                } else {
                    bar.innerText = `⏳ 等待对手下棋... (${turnText})`;
                }
            } else {
                bar.innerText = `👉 轮到 ${turnText} 的回合`;
            }
        }
    </script>
</body>
</html>
