<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>领地战 典藏版 ✨</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
    <style>
        /* 🌌 苹果风深邃背景 */
        body { margin: 0; padding: 0; height: 100vh; font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: linear-gradient(135deg, #1c1c1e 0%, #2c2c34 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; user-select: none; -webkit-user-select: none; color: white; overflow: hidden; }

        /* 📋 模态框通用样式 */
        .modal-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 50; transition: opacity 0.4s ease; }
        .modal-card { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); padding: 30px; border-radius: 28px; width: 85%; max-width: 420px; box-shadow: 0 30px 60px rgba(0,0,0,0.6); transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .modal-card.show { transform: scale(1); }

        .setup-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        select { background: rgba(0,0,0,0.5); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 8px 12px; border-radius: 12px; font-size: 1rem; outline: none; }
        
        .btn { width: 100%; padding: 16px; font-size: 1.1rem; font-weight: bold; border: none; border-radius: 16px; cursor: pointer; transition: 0.2s; margin-top: 10px; color: white; box-shadow: 0 10px 20px rgba(0,0,0,0.2);}
        .btn:active { transform: scale(0.95); }
        .btn-local { background: #FF9F0A; }
        .btn-host { background: #0A84FF; }
        .btn-join { background: #30D158; }

        input { width: 100%; padding: 15px; border-radius: 12px; border: none; font-size: 1.5rem; text-align: center; font-weight: bold; margin-top: 10px; background: rgba(0,0,0,0.5); color: #FFCC00; outline: none; text-transform: uppercase; box-sizing: border-box; }

        /* 🎮 游戏主界面 */
        #status-bar { width: 90%; max-width: 450px; padding: 12px 20px; border-radius: 16px; text-align: center; font-size: 1.2rem; font-weight: bold; margin-bottom: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.3); transition: 0.4s ease; box-sizing: border-box; }
        #board-container { width: 95vw; max-width: 450px; aspect-ratio: 1 / 1; background: rgba(40, 40, 45, 0.8); border-radius: 24px; padding: 8px; box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.1); box-sizing: border-box; }
        #board { display: grid; grid-template-columns: repeat(6, 1fr); grid-template-rows: repeat(6, 1fr); gap: 6px; width: 100%; height: 100%; }
        .cell { background: rgba(255,255,255,0.06); border-radius: 14px; position: relative; cursor: pointer; transition: background-color 0.3s ease, transform 0.1s; }
        .cell:active { transform: scale(0.92); }
        .dot { position: absolute; width: 30px; height: 30px; margin-top: -15px; margin-left: -15px; display: flex; justify-content: center; align-items: center; font-size: 24px; transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1); transform: scale(0); opacity: 0; pointer-events: none; }
        .dot.show { transform: scale(1); opacity: 1; }

        /* 🏆 豪华结算弹窗 & 满屏撒花动画 */
        #victory-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(35px); -webkit-backdrop-filter: blur(35px); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 999; opacity: 0; transition: opacity 0.6s ease; overflow: hidden;}
        .victory-card { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); padding: 40px; border-radius: 35px; width: 85%; max-width: 380px; text-align: center; box-shadow: 0 40px 100px rgba(0,0,0,0.9); transform: scale(0.5) translateY(50px); transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); z-index: 1000;}
        .victory-card.show { transform: scale(1) translateY(0); }
        .winner-icon { font-size: 7rem; margin-bottom: 15px; animation: winnerBounce 1.5s infinite ease-in-out; text-shadow: 0 20px 40px rgba(0,0,0,0.7); }
        .winner-text { font-size: 2.2rem; font-weight: 900; margin-bottom: 35px; color: white; text-shadow: 0 5px 15px rgba(0,0,0,0.6); letter-spacing: 2px; }
        @keyframes winnerBounce { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-20px) scale(1.1); } }
        
        .confetti { position: absolute; width: 12px; height: 12px; opacity: 0.9; animation: fall linear forwards; border-radius: 3px;}
        @keyframes fall { to { transform: translateY(110vh) rotate(720deg); } }

        /* 颜色 */
        .color-0 { background-color: #FFCC00 !important; color: #000; }
        .color-1 { background-color: #0A84FF !important; color: #fff; }
        .color-2 { background-color: #30D158 !important; color: #000; }
        .color-3 { background-color: #FF453A !important; color: #fff; }
    </style>
</head>
<body>

    <!-- 🌐 究极大厅 -->
    <div id="lobby-screen" class="modal-overlay">
        <div class="modal-card show" id="lobby-card">
            <h2 style="text-align: center; margin-top: 0;">🎮 领地战典藏版</h2>
            <div class="setup-row">
                <span style="font-weight: bold;">🎨 全局皮肤：</span>
                <select id="skin-select">
                    <option value="0">经典纯色 🟡🔵🟢🔴</option>
                    <option value="1">疯狂动物 🐹🐱🐶🐰</option>
                    <option value="2">快乐大餐 🍟🍕🍔🥤</option>
                    <option value="3">元素魔法 ⚡️💧🍃🔥</option>
                </select>
            </div>
            <div class="setup-row" style="background: rgba(255,255,255,0.05); padding: 10px; border-radius: 12px;">
                <span style="font-weight: bold; color: #30D158;">👥 参战人数：</span>
                <select id="player-count" onchange="updatePlayerUI()">
                    <option value="2" selected>2 人对决 (1v1)</option>
                    <option value="3">3 人混战 (1v1v1)</option>
                    <option value="4">4 人大乱斗！</option>
                </select>
            </div>
            <div id="players-config"></div>
            <button class="btn btn-local" onclick="startLocalGame()">🕹️ 开始本地/AI对战</button>
            <div style="display:flex; gap:10px; margin-top: 10px;">
                <button class="btn btn-host" onclick="hostOnlineGame()">🏠 创建房间</button>
                <button class="btn btn-join" onclick="showJoinMenu()">🚀 加入房间</button>
            </div>
            <div id="net-status" style="margin-top: 15px; color: #FFCC00; font-weight: bold; text-align: center;"></div>
        </div>
    </div>

    <!-- 接入房间 -->
    <div id="join-screen" class="modal-overlay" style="display:none; opacity:0;">
        <div class="modal-card">
            <h2 style="text-align: center; margin-top: 0;">🚀 接入战场</h2>
            <input type="text" id="room-input" placeholder="输入4位房间号" maxlength="4">
            <button class="btn btn-join" onclick="joinOnlineGame()">🔗 立即连线</button>
            <button class="btn" style="background: rgba(255,255,255,0.15);" onclick="hideJoinMenu()">返回大厅</button>
            <div id="join-status" style="margin-top: 15px; color: #FFCC00; font-weight: bold; text-align: center;"></div>
        </div>
    </div>

    <!-- 游戏区域 -->
    <div id="status-bar" style="display: none;"></div>
    <div id="board-container" style="display: none;"><div id="board"></div></div>

    <!-- 🏆 豪华结算弹窗 -->
    <div id="victory-screen">
        <div class="victory-card" id="victory-card">
            <div class="winner-icon" id="winner-icon">🏆</div>
            <div class="winner-text" id="winner-name">获胜！</div>
            <button class="btn" onclick="location.reload()" style="background: white; color: #1c1c1e; font-size: 1.3rem;">返回大厅 🏠</button>
        </div>
    </div>

    <script>
        const ROWS = 6, COLS = 6;
        let grid = [], isAnimating = false, gameEnded = false;
        let players = [], currentPlayerIndex = 0, firstMove = {}; 
        
        const skins = [['🟡','🔵','🟢','🔴'], ['🐹','🐱','🐶','🐰'], ['🍟','🍕','🍔','🥤'], ['⚡️','💧','🍃','🔥']];
        const colorNames = ['黄方', '蓝方', '绿方', '红方'];
        let currentSkinIndex = 0, currentSkin = skins[0];

        // --- 🌐 网络变量 ---
        let peer = null, conn = null, isOnlineMode = false, isHost = false, joinTimeout = null;

        function updatePlayerUI() {
            const count = parseInt(document.getElementById('player-count').value);
            const container = document.getElementById('players-config');
            container.innerHTML = '';
            for(let i=0; i<count; i++) {
                container.innerHTML += `
                    <div class="setup-row" style="border-bottom: none; margin-bottom: 5px;">
                        <span>${currentSkin[i]} ${colorNames[i]}：</span>
                        <select id="p${i}-type">
                            ${i===0 ? '<option value="human">👤 我(人类)</option>' : '<option value="human">👤 人类</option>'}
                            <option value="ai-easy">🤖 AI (智障)</option>
                            <option value="ai-medium">🤖 AI (普通)</option>
                            <option value="ai-hard" ${i>0 ? 'selected' : ''}>🧠 AI (深思)</option>
                        </select>
                    </div>`;
            }
        }

        function parseSettings() {
            currentSkinIndex = document.getElementById('skin-select').value;
            currentSkin = skins[currentSkinIndex];
            players = []; firstMove = {};
            const count = parseInt(document.getElementById('player-count').value);
            for(let i=0; i<count; i++) {
                players.push({ id: i, type: document.getElementById(`p${i}-type`).value.split('-')[0], diff: document.getElementById(`p${i}-type`).value.split('-')[1] || null });
            }
        }

        function startLocalGame() { parseSettings(); isOnlineMode = false; launchGameUI(); }

        function hostOnlineGame() {
            parseSettings(); isOnlineMode = true; isHost = true;
            const p2 = players.find(p => p.id === 1);
            if(p2) p2.type = 'remote'; 
            
            const statusEl = document.getElementById('net-status');
            statusEl.innerText = "正在开启星际网关...";
            const roomCode = Math.floor(1000 + Math.random() * 9000).toString();
            
            peer = new Peer('MOUSE' + roomCode);
            peer.on('open', id => { statusEl.innerHTML = `房间建立完毕！<br><span style="font-size:2.5rem; color:white;">${roomCode}</span><br>⏳ 5分钟内可接入...`; });
            peer.on('connection', connection => {
                conn = connection;
                conn.on('open', () => {
                    statusEl.innerText = "朋友已接入！正在同步战局...";
                    conn.send({ type: 'init', skinIndex: currentSkinIndex, players: players });
                    setupNetworkListeners(); setTimeout(launchGameUI, 1000);
                });
            });
            peer.on('error', err => { statusEl.innerText = "网络错误: " + err.type; });
        }

        function showJoinMenu() { document.getElementById('join-screen').style.display = 'flex'; requestAnimationFrame(()=> document.getElementById('join-screen').style.opacity = '1'); }
        function hideJoinMenu() { document.getElementById('join-screen').style.opacity = '0'; setTimeout(()=> document.getElementById('join-screen').style.display = 'none', 300); }

        function joinOnlineGame() {
            const code = document.getElementById('room-input').value.trim();
            const statusEl = document.getElementById('join-status');
            if(code.length !== 4) { statusEl.innerText = "请输入4位房间号！"; return; }
            statusEl.innerText = "正在跃迁至主机..."; peer = new Peer();
            
            joinTimeout = setTimeout(() => { peer.destroy(); statusEl.innerText = "连接超时 (5分钟未响应)！请确认房间号是否正确。"; }, 300000); 

            peer.on('open', () => {
                conn = peer.connect('MOUSE' + code);
                conn.on('open', () => {
                    clearTimeout(joinTimeout); statusEl.innerText = "连接成功！等待主机同步数据...";
                    isOnlineMode = true; isHost = false; setupNetworkListeners();
                });
            });
            peer.on('error', err => { clearTimeout(joinTimeout); statusEl.innerText = "未找到房间或网络断开！"; });
        }

        function setupNetworkListeners() {
            conn.on('data', data => {
                if(data.type === 'init' && !isHost) { currentSkinIndex = data.skinIndex; currentSkin = skins[currentSkinIndex]; players = data.players; launchGameUI(); }
                if(data.type === 'click') { executeClick(data.r, data.c); }
            });
        }

        function launchGameUI() {
            document.getElementById('lobby-screen').style.display = 'none';
            document.getElementById('join-screen').style.display = 'none';
            document.getElementById('status-bar').style.display = 'block';
            document.getElementById('board-container').style.display = 'block';
            initBoard();
        }

        // --- 🎮 核心游戏引擎 ---
        function initBoard() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = ''; grid = [];
            for (let r = 0; r < ROWS; r++) {
                let row = [];
                for (let c = 0; c < COLS; c++) {
                    const cellEl = document.createElement('div');
                    cellEl.className = 'cell'; cellEl.onclick = () => onCellClicked(r, c); 
                    boardEl.appendChild(cellEl);
                    row.push({ player: null, dots: 0, limit: getLimit(r, c), element: cellEl, dotElements: [] });
                }
                grid.push(row);
            }
            currentPlayerIndex = 0; gameEnded = false;
            players.forEach(p => firstMove[p.id] = true);
            updateUI(); checkAITurn();
        }

        function getLimit(r, c) { let limit = 4; if (r === 0 || r === ROWS - 1) limit--; if (c === 0 || c === COLS - 1) limit--; return limit; }

        // 🚨 绝对严谨的生存检测：还没下过棋？或者棋盘上有你的棋子？算你活着！
        function isPlayerAlive(pid) {
            if (firstMove[pid]) return true; 
            for(let r=0; r<ROWS; r++) {
                for(let c=0; c<COLS; c++) {
                    if(grid[r][c].player === pid) return true;
                }
            }
            return false;
        }

        function onCellClicked(r, c) {
            if (isAnimating || gameEnded) return;
            const p = players[currentPlayerIndex];
            if (isOnlineMode) { if (isHost && p.id !== 0) return; if (!isHost && p.id !== 1) return; } 
            else { if (p.type !== 'human') return; }

            const cell = grid[r][c];
            if (cell.player !== null && cell.player !== p.id) return; 

            if (isOnlineMode && conn) conn.send({type: 'click', r: r, c: c});
            executeClick(r, c);
        }

        async function executeClick(r, c) {
            const pId = players[currentPlayerIndex].id;
            const cell = grid[r][c];

            let dotsToAdd = firstMove[pId] ? 3 : 1;
            firstMove[pId] = false; 

            cell.player = pId;
            for(let i = 0; i < dotsToAdd; i++) { cell.dots++; renderCell(r, c); }

            isAnimating = true;
            await checkExplosions();
            if(!checkWin()) nextTurn();
        }

        function nextTurn() {
            let loopCount = 0;
            do {
                currentPlayerIndex = (currentPlayerIndex + 1) % players.length;
                loopCount++; if(loopCount > 10) break;
            } while(!isPlayerAlive(players[currentPlayerIndex].id));

            updateUI(); isAnimating = false; checkAITurn();
        }

        function renderCell(r, c) {
            const cell = grid[r][c]; const el = cell.element;
            el.className = cell.dots > 0 ? `cell color-${cell.player}` : 'cell';

            while (cell.dotElements.length < cell.dots) {
                const dot = document.createElement('div'); dot.className = 'dot'; el.appendChild(dot);
                requestAnimationFrame(() => requestAnimationFrame(() => dot.classList.add('show')));
                cell.dotElements.push(dot);
            }
            while (cell.dotElements.length > cell.dots) {
                const dot = cell.dotElements.pop(); dot.classList.remove('show');
                setTimeout(() => dot.remove(), 300);
            }

            const positions = getPositions(cell.dots);
            cell.dotElements.forEach((dot, index) => {
                dot.innerText = currentSkin[cell.player];
                if (positions[index]) { dot.style.left = positions[index].left; dot.style.top = positions[index].top; }
            });
        }

        function getPositions(count) {
            if (count === 1) return [{ left: '50%', top: '50%' }];
            if (count === 2) return [{ left: '35%', top: '35%' }, { left: '65%', top: '65%' }];
            if (count === 3) return [{ left: '50%', top: '25%' }, { left: '30%', top: '70%' }, { left: '70%', top: '70%' }];
            if (count >= 4) return [{ left: '30%', top: '30%' }, { left: '70%', top: '30%' }, { left: '30%', top: '70%' }, { left: '70%', top: '70%' }];
            return [];
        }

        async function checkExplosions() {
            let exploding = true;
            while (exploding) {
                exploding = false; let toExplode = [];
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        if (grid[r][c].dots >= grid[r][c].limit) toExplode.push({r, c, player: grid[r][c].player});
                    }
                }
                if (toExplode.length > 0) {
                    exploding = true; await new Promise(resolve => setTimeout(resolve, 250)); 
                    for (let t of toExplode) {
                        grid[t.r][t.c].dots -= grid[t.r][t.c].limit;
                        if (grid[t.r][t.c].dots === 0) grid[t.r][t.c].player = null;
                        renderCell(t.r, t.c);
                        const neighbors = [[t.r-1, t.c], [t.r+1, t.c], [t.r, t.c-1], [t.r, t.c+1]];
                        for (let n of neighbors) {
                            const nr = n[0], nc = n[1];
                            if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
                                grid[nr][nc].player = t.player; grid[nr][nc].dots++; renderCell(nr, nc);
                            }
                        }
                    }
                }
            }
        }

        async function checkAITurn() {
            const p = players[currentPlayerIndex];
            if (p.type !== 'ai' || gameEnded) return;
            if (isOnlineMode && !isHost) return; 

            isAnimating = true; await new Promise(resolve => setTimeout(resolve, 700)); 

            let validMoves = [];
            for(let r=0; r<ROWS; r++) {
                for(let c=0; c<COLS; c++) {
                    if(grid[r][c].player === null || grid[r][c].player === p.id) validMoves.push({r, c});
                }
            }
            if(validMoves.length === 0) { isAnimating = false; nextTurn(); return; }
            
            let move;
            if (p.diff === 'easy') { move = validMoves[Math.floor(Math.random() * validMoves.length)]; } 
            else if (p.diff === 'medium') {
                validMoves.sort((a,b) => (grid[a.r][a.c].limit - grid[a.r][a.c].dots) - (grid[b.r][b.c].limit - grid[b.r][b.c].dots));
                move = validMoves[0];
            } else {
                let bestScore = -9999;
                for (let m of validMoves) {
                    let score = 0; let cell = grid[m.r][m.c];
                    let willExplode = (cell.dots + (firstMove[p.id] ? 3 : 1)) >= cell.limit;
                    if (willExplode) score += 100;
                    if (cell.limit === 2) score += 20; if (cell.limit === 3) score += 5;
                    
                    const neighbors = [[m.r-1, m.c], [m.r+1, m.c], [m.r, m.c-1], [m.r, m.c+1]];
                    for (let n of neighbors) {
                        const nr = n[0], nc = n[1];
                        if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
                            let nCell = grid[nr][nc];
                            if (nCell.player !== null && nCell.player !== p.id && nCell.dots + 1 === nCell.limit) { score -= 50; }
                        }
                    }
                    score += Math.random() * 5; 
                    if (score > bestScore) { bestScore = score; move = m; }
                }
            }

            if (isOnlineMode && isHost) conn.send({type: 'click', r: move.r, c: move.c});
            executeClick(move.r, move.c);
        }

        // 🚨 重构的绝对完美裁判系统
        function checkWin() {
            let activePlayers = new Set();
            let totalDots = 0;
            
            // 扫描棋盘上所有的势力
            for(let r=0; r<ROWS; r++) {
                for(let c=0; c<COLS; c++) {
                    if(grid[r][c].player !== null) {
                        activePlayers.add(grid[r][c].player);
                        totalDots++;
                    }
                }
            }

            // 检查是不是还有人没下第一步
            let anyFirstMovePending = false;
            players.forEach(p => { if (firstMove[p.id]) anyFirstMovePending = true; });

            // 只有当：棋盘上有子 + 只有一家势力 + 所有人都下过棋了，才算赢！
            if (totalDots > 0 && activePlayers.size === 1 && !anyFirstMovePending) {
                gameEnded = true;
                let winner = Array.from(activePlayers)[0];
                setTimeout(() => showVictory(winner), 500);
                return true;
            }
            return false;
        }

        // 🏆 绝美满屏撒花动画！
        function showVictory(winnerId) {
            const vs = document.getElementById('victory-screen');
            const vc = document.getElementById('victory-card');
            const rgbColors = ['255,204,0', '10,132,255', '48,209,88', '255,69,58'];
            
            document.getElementById('winner-icon').innerText = currentSkin[winnerId];
            document.getElementById('winner-name').innerText = `${colorNames[winnerId]} 傲视群雄！`;
            vc.style.background = `linear-gradient(135deg, rgba(30,30,35,0.9), rgba(${rgbColors[winnerId]}, 0.5))`;

            vs.style.display = 'flex';
            
            // 魔法彩纸生成器
            for(let i=0; i<60; i++) {
                let conf = document.createElement('div');
                conf.className = 'confetti';
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.top = '-20px';
                conf.style.backgroundColor = `hsl(${Math.random()*360}, 100%, 60%)`;
                conf.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
                conf.style.animationDelay = (Math.random() * 1) + 's';
                vs.appendChild(conf);
            }

            requestAnimationFrame(() => { requestAnimationFrame(() => { vs.style.opacity = '1'; vc.classList.add('show'); }); });
        }

        function updateUI() {
            const bar = document.getElementById('status-bar');
            const p = players[currentPlayerIndex];
            bar.className = `color-${p.id}`;
            let turnText = currentSkin[p.id] + '方';
            
            if (isOnlineMode) {
                if ((isHost && p.id === 0) || (!isHost && p.id === 1)) bar.innerText = `👉 你的回合 (${turnText})`;
                else if (p.type === 'ai') bar.innerText = `🤖 AI思考中... (${turnText})`;
                else bar.innerText = `⏳ 等待对手下棋... (${turnText})`;
            } else {
                let typeName = p.type === 'human' ? '人类' : 'AI';
                bar.innerText = `👉 轮到 ${turnText} (${typeName})`;
            }
        }

        updatePlayerUI();
        document.getElementById('skin-select').addEventListener('change', updatePlayerUI);
    </script>
</body>
</html>
