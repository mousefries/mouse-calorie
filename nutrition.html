<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>AI 营养追踪器</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* 🍎 苹果原生字体与色彩规范 */
        :root {
            --bg-grad-1: #2c1b4d;
            --bg-grad-2: #1c1c38;
            --primary: #FF3B30; /* iOS 红 */
            --secondary: #5856D6; /* iOS 紫 */
            --success: #34C759; /* iOS 绿 */
            --warning: #FF9500; /* iOS 橙 */
            --text-main: #ffffff;
            --text-sub: rgba(255,255,255,0.6);
            /* iOS 经典毛玻璃材质 */
            --glass-bg: rgba(255, 255, 255, 0.12);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        body.dark-mode {
            --bg-grad-1: #000000;
            --bg-grad-2: #1a1a2e;
            --glass-bg: rgba(30, 30, 30, 0.4);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body { 
            /* 强制调用苹果设备的原生字体 */
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
            color: var(--text-main); 
            padding: 20px; 
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--bg-grad-1), var(--bg-grad-2));
            -webkit-user-select: none; 
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            transition: background 0.5s ease;
        }

        #particles-js { position: fixed; width: 100%; height: 100%; top: 0; left: 0; z-index: 1; pointer-events: none; }

        .card-container { position: relative; z-index: 2; max-width: 500px; width: 100%; margin-top: 20px; }

        /* 🍎 苹果风极致毛玻璃卡片 */
        .card { 
            background: var(--glass-bg); 
            backdrop-filter: saturate(180%) blur(25px);
            -webkit-backdrop-filter: saturate(180%) blur(25px);
            padding: 30px 25px; 
            border-radius: 32px; /* 更大的圆角 */
            box-shadow: var(--glass-shadow); 
            border: 1px solid var(--glass-border);
            text-align: center;
        }

        .header-actions { position: absolute; top: 20px; right: 25px; z-index: 10; }
        .icon-btn { background: var(--glass-bg); border: 1px solid var(--glass-border); font-size: 16px; cursor: pointer; color: white; width: 36px; height: 36px; border-radius: 18px; backdrop-filter: blur(10px); transition: 0.2s; }
        .icon-btn:active { transform: scale(0.9); }

        h2 { font-weight: 700; margin: 0 0 8px 0; font-size: 24px; letter-spacing: 0.5px; }
        h2 span { animation: starRotate 3s linear infinite; display: inline-block; }
        @keyframes starRotate { 0% { transform: rotate(0); } 100% { transform: rotate(360deg); } }

        /* 锦囊区 */
        .quote-box {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 12px 16px;
            margin-bottom: 25px;
            font-size: 13px;
            color: rgba(255,255,255,0.9);
            text-align: left;
            font-weight: 500;
        }

        /* 🍎 iOS 原生风格输入框 */
        textarea { 
            width: 100%; height: 90px; padding: 16px; margin: 15px 0; 
            border-radius: 20px; 
            border: none;
            background: rgba(0, 0, 0, 0.2); 
            color: white; 
            font-size: 16px; 
            resize: none; 
            box-sizing: border-box;
            font-family: inherit;
            transition: 0.3s;
        }
        textarea::placeholder { color: var(--text-sub); }
        textarea:focus { outline: none; background: rgba(0, 0, 0, 0.3); box-shadow: inset 0 0 0 1px var(--secondary); }

        /* 🍎 iOS 大圆角强调按钮 */
        button.main-btn { 
            background: var(--text-main);
            color: #1c1c38; 
            border: none; padding: 16px 0; border-radius: 24px; 
            font-size: 17px; cursor: pointer; font-weight: 600; width: 100%; 
            transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
            margin-bottom: 10px;
        }
        button.main-btn:active { transform: scale(0.96); background: rgba(255,255,255,0.8); }

        /* 进度条 */
        .progress-text { font-size: 13px; color: var(--text-sub); margin-bottom: 8px; text-align: left; font-weight: 500;}
        .progress-container { width: 100%; background: rgba(0,0,0,0.2); border-radius: 10px; height: 12px; margin-bottom: 20px; overflow: hidden; }
        .progress-bar { 
            height: 100%; 
            background: var(--success); 
            width: 0%; 
            transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); 
        }

        /* 数据网格 */
        .stats { display: flex; justify-content: space-between; margin-top: 25px; gap: 12px; }
        .stat-box { 
            background: rgba(255,255,255,0.08); 
            padding: 16px 5px; 
            border-radius: 20px; 
            flex: 1; 
            font-size: 12px; 
            color: var(--text-sub);
            font-weight: 500;
        }
        .stat-val { font-size: 22px; font-weight: 700; color: white; margin: 4px 0; display: block; }
        
        #msg { margin-top: 15px; font-size: 14px; color: #1c1c38; font-weight: 600; background: rgba(255,255,255,0.9); padding: 16px; border-radius: 18px; display: none; line-height: 1.5; text-align: left; }
        #loading { color: rgba(255,255,255,0.8); font-size: 14px; margin-top: 10px; display: none; font-weight: 500; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }

        .chart-container { width: 160px; height: 160px; margin: 20px auto; position: relative; }
        hr { border: none; border-top: 1px solid rgba(255,255,255,0.1); margin: 30px 0; }

        /* 流水账 */
        .log-list { text-align: left; margin-top: 15px; max-height: 250px; overflow-y: auto; padding-right: 5px; }
        .log-item { background: rgba(255,255,255,0.05); padding: 14px 16px; border-radius: 16px; margin-bottom: 10px; font-size: 15px; display: flex; justify-content: space-between; align-items: center; }
        .log-time { color: var(--text-sub); font-size: 13px; margin-right: 12px; font-weight: 500;}
        .del-btn { color: var(--text-main); background: rgba(255,255,255,0.1); border: none; width: 28px; height: 28px; border-radius: 14px; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center;}
        .del-btn:active { background: var(--primary); }
        .btn-clear { background: transparent; color: var(--primary); border: none; font-weight: 600; padding: 12px; font-size: 15px; margin-top: 20px; cursor: pointer; width: 100%;}
        .btn-clear:active { opacity: 0.7; }
    </style>
</head>
<body>
    <div id="particles-js"></div>

    <div class="card-container">
        <div class="card">
            <div class="header-actions">
                <button class="icon-btn" onclick="toggleDarkMode()" id="themeIcon">🌙</button>
            </div>

            <h2> AI <span>✨</span> 营养追踪器</h2>
            
            <div class="quote-box" id="quote-display">今天也要元气满满喵！</div>
            
            <div class="progress-text">🔥 目标 2200 kcal | 已刷: <span id="cal-current">0</span> kcal</div>
            <div class="progress-container">
                <div class="progress-bar" id="cal-progress"></div>
            </div>

            <textarea id="foodInput" placeholder="😋 今天炫了什么好吃的？"></textarea>
            
            <button class="main-btn" onclick="analyzeFood()">记录这一顿</button>
            <div id="loading">🔮 魔法演算中...</div>
            <div id="msg"></div>

            <hr>
            
            <div class="chart-container">
                <canvas id="macroChart"></canvas>
            </div>
            
            <div class="stats">
                <div class="stat-box">🔥热量<span class="stat-val" id="tot-cal">0</span>kcal</div>
                <div class="stat-box">🥩蛋白<span class="stat-val" id="tot-pro">0</span>g</div>
                <div class="stat-box">🍞碳水<span class="stat-val" id="tot-car">0</span>g</div>
                <div class="stat-box">🧈脂肪<span class="stat-val" id="tot-fat">0</span>g</div>
            </div>

            <hr>
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3 style="margin:0; font-size: 18px; font-weight:600;">饮食时光机</h3>
            </div>
            
            <div class="log-list" id="log-container"></div>

            <button class="btn-clear" onclick="clearData()">清空今日记录</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        const QUOTES = [
            "每一克蛋白质，都是通往 60kg 的阶梯喵！加油！",
            "刚瞪完椭圆机？那现在的你需要来点优质碳水补补！",
            "减脂不是为了饿肚子，是为了更健康的吃！",
            "DeepSeek 魔法师提醒你：控制脂肪摄入是关键！",
            "向着 60kg，冲鸭！🐹✨",
            "多吃蔬菜，你的肠道会给你点赞！ Broccoli 🥦 Power！",
            "运动完记得多喝水喵！"
        ];

        particlesJS("particles-js", {
            particles: {
                number: { value: 40, density: { enable: true, value_area: 800 } },
                color: { value: ["#ffffff"] }, 
                shape: { type: ["circle"] },
                opacity: { value: 0.3, random: true },
                size: { value: 3, random: true },
                line_linked: { enable: false },
                move: { enable: true, speed: 1, direction: "top", random: true, out_mode: "out" }
            },
            interactivity: { events: { onhover: { enable: false }, onclick: { enable: false } } }
        });

        let nutritionData = JSON.parse(localStorage.getItem('mouse_nutrition_v3')) || { cal: 0, pro: 0, car: 0, fat: 0, logs: [] };
        const TARGET_CAL = 2200; 
        let macroChart;

        window.onload = function() {
            document.getElementById('quote-display').innerText = QUOTES[Math.floor(Math.random() * QUOTES.length)];
            if(localStorage.getItem('mouse_darkmode') === 'true') {
                document.body.classList.add('dark-mode');
                document.getElementById('themeIcon').innerText = '☀️';
            }
            updateUI();
            initChart();
        }

        function toggleDarkMode() {
            const body = document.body;
            body.classList.toggle('dark-mode');
            const isDark = body.classList.contains('dark-mode');
            localStorage.setItem('mouse_darkmode', isDark);
            document.getElementById('themeIcon').innerText = isDark ? '☀️' : '🌙';
        }

        async function analyzeFood() {
            const text = document.getElementById('foodInput').value;
            if (!text) return alert("❌ 快告诉我炫了什么喵！");
            
            document.getElementById('loading').style.display = 'block';
            document.getElementById('msg').style.display = 'none';

            // ⚠️ 重点优化：剥离了 msg 请求，极大缩短 AI 响应时间，节省 Token
            const prompt = `你是一个专业的营养师。用户刚刚吃下了这些食物：${text}。
            请估算总卡路里(kcal)、蛋白质(g)、碳水(g)和脂肪(g)。
            请严格返回JSON格式，不要有任何文字或Markdown标记。格式如下：
            {"cal": 120, "pro": 10.5, "car": 20, "fat": 5}`;

            try {
                const response = await fetch("https://api.mousefries.top/chat/completions", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: "deepseek-chat",
                        messages: [
                            {"role": "system", "content": "你是一个输出纯JSON格式的营养师。"},
                            {"role": "user", "content": prompt}
                        ],
                        response_format: { type: "json_object" }
                    })
                });
                
                if (!response.ok) throw new Error("API 请求失败");

                const data = await response.json();
                let resultText = data.choices[0].message.content;
                resultText = resultText.replace(/```json/g, '').replace(/```/g, '').trim();
                const result = JSON.parse(resultText);

                nutritionData.cal += result.cal; 
                nutritionData.pro += result.pro; 
                nutritionData.car += result.car; 
                nutritionData.fat += result.fat;

                const now = new Date();
                const timeStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
                const summary = text.length > 10 ? text.substring(0, 10) + "..." : text; 
                nutritionData.logs.unshift({ 
                    id: Date.now(), time: timeStr, text: summary, cal: result.cal, pro: result.pro, car: result.car, fat: result.fat
                });

                saveData(); updateUI();

                // ⚠️ 重点优化：直接使用专属的固定金句，无需 AI 现编
                const fixedMsg = "记录成功喵！每一口优质营养，都是向着目标进发的基石！🐹✨";
                document.getElementById('msg').innerHTML = `💡 <b>提示：</b><br>${fixedMsg}`;
                document.getElementById('msg').style.display = 'block';
                document.getElementById('foodInput').value = ''; 
                document.getElementById('quote-display').innerText = QUOTES[Math.floor(Math.random() * QUOTES.length)];

            } catch (e) {
                alert("🚧 哎呀，魔法反噬了！可能是网络通道堵车喵！");
                console.error(e);
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        function deleteLog(id) {
            const index = nutritionData.logs.findIndex(log => log.id === id);
            if(index > -1) {
                const log = nutritionData.logs[index];
                nutritionData.cal = Math.max(0, nutritionData.cal - log.cal);
                nutritionData.pro = Math.max(0, nutritionData.pro - log.pro);
                nutritionData.car = Math.max(0, nutritionData.car - log.car);
                nutritionData.fat = Math.max(0, nutritionData.fat - log.fat);
                nutritionData.logs.splice(index, 1); 
                saveData(); updateUI();
            }
        }

        function saveData() { localStorage.setItem('mouse_nutrition_v3', JSON.stringify(nutritionData)); }

        function updateUI() {
            document.getElementById('tot-cal').innerText = nutritionData.cal.toFixed(1);
            document.getElementById('tot-pro').innerText = nutritionData.pro.toFixed(1);
            document.getElementById('tot-car').innerText = nutritionData.car.toFixed(1);
            document.getElementById('tot-fat').innerText = nutritionData.fat.toFixed(1);
            
            document.getElementById('cal-current').innerText = nutritionData.cal.toFixed(0);
            let percent = (nutritionData.cal / TARGET_CAL) * 100;
            if (percent > 100) percent = 100;
            const bar = document.getElementById('cal-progress');
            bar.style.width = percent + '%';
            
            if(percent >= 100) { bar.style.background = 'var(--primary)'; }
            else if (percent > 80) { bar.style.background = 'var(--warning)'; }
            else { bar.style.background = 'var(--success)'; }

            const logBox = document.getElementById('log-container');
            logBox.innerHTML = '';
            if(nutritionData.logs.length === 0) {
                logBox.innerHTML = '<p style="color:var(--text-sub); font-size: 14px; text-align:center; margin-top:30px;">今日还未记录喵</p>';
            } else {
                nutritionData.logs.forEach(log => {
                    logBox.innerHTML += `
                        <div class="log-item">
                            <div style="display:flex; align-items:center;">
                                <span class="log-time">${log.time}</span>
                                <span>${log.text} <span style="font-weight:600; color:var(--text-sub); margin-left:6px;">+${log.cal}</span></span>
                            </div>
                            <button class="del-btn" onclick="deleteLog(${log.id})">✖</button>
                        </div>
                    `;
                });
            }

            if (macroChart) {
                macroChart.data.datasets[0].data = [nutritionData.pro, nutritionData.car, nutritionData.fat];
                macroChart.update();
            }
        }

        function initChart() {
            const ctx = document.getElementById('macroChart').getContext('2d');
            Chart.defaults.color = 'rgba(255, 255, 255, 0.6)';
            macroChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['蛋白质', '碳水', '脂肪'],
                    datasets: [{
                        data: [nutritionData.pro, nutritionData.car, nutritionData.fat],
                        backgroundColor: ['#34C759', '#FF9500', '#FF3B30'], 
                        borderWidth: 0,
                        hoverOffset: 4
                    }]
                },
                options: {
                    responsive: true,
                    cutout: '75%',
                    plugins: { legend: { display: false } },
                    animation: { animateRotate: true, animateScale: true }
                }
            });
        }

        function clearData() {
            if(confirm("确定清空今日数据吗？")) {
                nutritionData = { cal: 0, pro: 0, car: 0, fat: 0, logs: [] };
                saveData(); updateUI();
                document.getElementById('msg').style.display = 'none';
            }
        }
    </script>
</body>
</html>
