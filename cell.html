<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>细胞防卫战：微观前线 (强制时停版)</title>
    <style>
        :root { --primary: #ff85a2; --secondary: #4ecdc4; --text-main: #4a4a4a; --bg-light: #fdf6e3; }
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0; height: 100dvh; display: flex; flex-direction: column;
            background-color: var(--bg-light); color: var(--text-main);
            font-family: 'Segoe UI', 'Nunito', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; user-select: none;
            background-image: radial-gradient(rgba(255, 133, 162, 0.15) 2px, transparent 2px); background-size: 30px 30px;
        }

        .main-layout { display: flex; flex-direction: column; height: 100%; width: 100%; position: relative; }
        .game-container { flex: 1; display: flex; justify-content: center; align-items: center; position: relative; background: #fff0f5; }
        canvas {
            max-width: 100%; max-height: 100%; object-fit: contain;
            box-shadow: 0 10px 30px rgba(255, 133, 162, 0.2); 
            image-rendering: -moz-crisp-edges; image-rendering: -webkit-optimize-contrast; image-rendering: crisp-edges; image-rendering: pixelated;
        }
        
        /* 状态栏挪到了最上面 */
        .status-bar {
            background: rgba(255, 255, 255, 0.95); padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 4px solid var(--primary); box-shadow: 0 5px 15px rgba(0,0,0,0.05); z-index: 10;
        }
        
        @media (min-width: 800px) {
            .main-layout { padding: 20px; align-items: center; justify-content: center; }
            .status-bar { border-radius: 20px 20px 0 0; width: 600px; border-bottom: none; border: 4px solid var(--primary); border-bottom: none; }
            .game-container { flex: none; height: 85vh; width: 600px; border-radius: 0 0 20px 20px; border: 4px solid var(--primary); border-top: none; overflow: hidden; }
        }

        .hp-hearts { font-size: 1.5rem; letter-spacing: 3px; color: #ff4d6d; }
        .atp-container { flex: 1; margin: 0 20px; background: #ffe3e8; border-radius: 15px; height: 24px; position: relative; overflow: hidden; border: 2px solid var(--primary); }
        .atp-bar { height: 100%; background: linear-gradient(90deg, #ff85a2, #ff9eb5); width: 100%; transition: width 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .atp-text { position: absolute; width: 100%; text-align: center; top: 2px; font-size: 13px; font-weight: bold; color: #fff; text-shadow: 0px 1px 2px rgba(0,0,0,0.2); }

        .btn-action {
            background: var(--primary); color: white; border: none; box-shadow: 0 6px 15px rgba(255, 133, 162, 0.4);
            padding: 15px; font-size: 1.1rem; font-weight: bold; width: 100%; cursor: pointer; transition: 0.2s;
            border-radius: 25px; margin-bottom: 10px; letter-spacing: 1px;
        }
        .btn-action:hover { background: #ff7495; transform: translateY(-3px); }
        .btn-action:active { transform: translateY(1px); }

        /* 全屏通用 Overlay */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(253, 246, 227, 0.95); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); overflow-y: auto;
        }
        
        /* 🚨 强制答题全屏弹窗 */
        .quiz-modal {
            background: white; border: 4px solid var(--secondary); border-radius: 20px; padding: 30px;
            width: 90%; max-width: 500px; box-shadow: 0 20px 50px rgba(0,0,0,0.2); text-align: center;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        
        #questionText { color: var(--text-main); font-size: 1.2rem; line-height: 1.5; margin: 20px 0; font-weight: 800; }
        .option-label {
            display: block; margin-bottom: 12px; padding: 15px; background: #f8f9fa; border: 2px solid #e9ecef;
            border-radius: 12px; cursor: pointer; transition: 0.2s; color: var(--text-main); font-weight: 700; font-size: 1.1rem;
        }
        .option-label:hover { background: #f0fdfa; border-color: var(--secondary); transform: translateY(-2px); }

        .story-text { max-width: 600px; color: var(--text-main); line-height: 1.8; font-size: 1.1rem; margin-bottom: 30px; background: #fff; padding: 25px; border-radius: 20px; border: 2px dashed var(--primary); }
    </style>
</head>
<body>

    <!-- 开始界面 -->
    <div id="startScreen" class="overlay">
        <h1 style="color: var(--primary); font-size: 2.5rem; text-align: center; margin-bottom: 10px;">细胞防卫战</h1>
        <div class="story-text">
            <p><strong>🕹️ 核心机制更新：</strong><br>
            ✨ 发射抗体会消耗 <span>ATP能量</span>！<br>
            🚨 <strong>注意：一旦能量耗尽，游戏将强制触发【时间静止】，必须答对科普问题才能解除危机并回满能量！</strong></p>
        </div>
        <div style="width: 100%; max-width: 300px;">
            <button class="btn-action" onclick="startGame()">🌸 准备就绪，开始！</button>
        </div>
    </div>

    <!-- 🚨 强制时停答题界面 -->
    <div id="quizScreen" class="overlay" style="display: none; background: rgba(0,0,0,0.6);">
        <div class="quiz-modal">
            <h2 style="color: #ff4d6d; margin-top: 0; font-size: 1.8rem;">🚨 警告：ATP 已耗尽！</h2>
            <p style="color: #666; font-weight: bold;">时空已冻结，回答导师问题重新激活免疫系统！</p>
            <div id="questionText">获取题目中...</div>
            <div id="optionsGroup"></div>
        </div>
    </div>

    <div class="main-layout" id="gameUI" style="opacity: 0;">
        <div class="status-bar">
            <div class="hp-hearts" id="hpDisplay">❤️❤️❤️</div>
            <div class="atp-container" id="atpBox">
                <div class="atp-bar" id="atpBar"></div>
                <div class="atp-text" id="atpText">ATP: 100%</div>
            </div>
            <div id="scoreDisplay" style="font-weight: 900; color: var(--secondary); font-size: 1.2rem;">0 分</div>
        </div>
        <div class="game-container">
            <canvas id="gameStage" width="600" height="800"></canvas>
            <div id="spellAlert" style="position: absolute; top: 30%; width: 100%; text-align: center; color: var(--secondary); font-weight: 900; font-size: 2rem; text-shadow: 0 0 10px #fff; pointer-events: none; opacity: 0; transition: opacity 0.5s;"></div>
        </div>
    </div>

<script>
    const assets = { player: new Image(), enemyNormal: new Image(), enemyBoss: new Image(), bullet: new Image() };
    assets.player.src = 'image_16.png';       
    assets.enemyNormal.src = 'image_17.png';  
    assets.enemyBoss.src = 'image_18.png';   
    assets.bullet.src = 'image_19.png';       

    const canvas = document.getElementById('gameStage');
    const ctx = canvas.getContext('2d');
    
    let gameState = 'MENU'; // MENU, PLAYING, QUIZ_PAUSE, GAMEOVER
    let hp = 3; let score = 0; 
    let playerAtp = 100; const MAX_ATP = 100; 
    
    let lastTime = performance.now(); let fireTimer = 0; let spawnTimer = 0; let globalTime = 0;
    
    const player = { x: 300, y: 700, hitRadius: 4, grazeRadius: 50 }; 
    let boss = { active: false, x: 300, y: -100, hp: 800, maxHp: 800, state: 'waiting', phase: 1, phaseTimer: 0 };
    
    let bullets = []; let enemyBullets = []; let enemies = []; let particles = [];
    let activeSpell = null; let spellTimer = 0; let screenShake = 0;

    let touchActive = false; let targetX = player.x; let targetY = player.y;
    canvas.addEventListener('touchmove', e => {
        if(gameState !== 'PLAYING') return;
        e.preventDefault(); touchActive = true;
        let rect = canvas.getBoundingClientRect();
        targetX = (e.touches[0].clientX - rect.left) * (canvas.width / rect.width);
        targetY = (e.touches[0].clientY - rect.top) * (canvas.height / rect.height);
    }, {passive: false});

    function startGame() { 
        document.getElementById('startScreen').style.display = 'none'; 
        document.getElementById('gameUI').style.opacity = '1';
        gameState = 'PLAYING'; lastTime = performance.now();
        requestAnimationFrame(gameLoop); 
    }

    function update(dt) {
        if (gameState !== 'PLAYING') return; // 如果不是游玩状态，时间彻底静止！

        globalTime += dt;
        if (spellTimer > 0) {
            spellTimer -= dt;
            if (spellTimer <= 0) { activeSpell = null; }
        }
        if (screenShake > 0) screenShake -= dt * 20;

        if (touchActive) {
            player.x += (targetX - player.x) * 15 * dt; player.y += (targetY - player.y) * 15 * dt;
        }
        player.x = Math.max(50, Math.min(canvas.width - 50, player.x));
        player.y = Math.max(50, Math.min(canvas.height - 50, player.y));

        fireTimer += dt;
        let fireRate = activeSpell === 'mitochondria' ? 0.06 : 0.18; 
        
        if (fireTimer > fireRate) {
            if (playerAtp > 0) {
                if (activeSpell === 'golgi') {
                    for(let i=-2; i<=2; i++) bullets.push({x: player.x, y: player.y, vx: i*90, vy: -600});
                } else {
                    bullets.push({x: player.x - 20, y: player.y, vx: 0, vy: -600});
                    bullets.push({x: player.x + 20, y: player.y, vx: 0, vy: -600});
                }
                if(!activeSpell) playerAtp -= 1.5; // 加快耗电速度，强制做题！
            }
            fireTimer = 0;
        }

        // 🚨 核心逻辑：ATP 耗尽，强制弹窗做题！
        if (playerAtp <= 0 && gameState === 'PLAYING') {
            playerAtp = 0;
            triggerFullScreenQuiz();
        }

        let atpPercent = (playerAtp / MAX_ATP) * 100;
        document.getElementById('atpBar').style.width = atpPercent + '%';
        document.getElementById('atpText').innerText = `ATP: ${Math.floor(atpPercent)}%`;

        if (score >= 1000 && !boss.active) { boss.active = true; boss.state = 'entering'; enemies = []; }

        if (boss.active) {
            boss.phaseTimer += dt;
            if (boss.state === 'entering') {
                boss.y += 60 * dt; if (boss.y > 180) { boss.state = 'fighting'; boss.phase = 1; }
            } else if (boss.state === 'fighting') {
                boss.x = 300 + Math.sin(globalTime) * 130; boss.y = 180 + Math.cos(globalTime * 1.5) * 40;
                
                if (boss.phaseTimer > 0.12) {
                    let angle1 = globalTime * 2.5; let angle2 = globalTime * 2.5 + Math.PI;
                    enemyBullets.push({x: boss.x, y: boss.y, vx: Math.cos(angle1)*280, vy: Math.sin(angle1)*280, isRed: false});
                    enemyBullets.push({x: boss.x, y: boss.y, vx: Math.cos(angle2)*280, vy: Math.sin(angle2)*280, isRed: false});
                    boss.phaseTimer = 0;
                }
            }
        } else {
            spawnTimer += dt;
            if (spawnTimer > 1.0) {
                enemies.push({ x: Math.random() * (canvas.width - 100) + 50, y: -50, radius: 35, vy: Math.random() * 50 + 80, hp: 2 });
                spawnTimer = 0;
            }
        }

        bullets.forEach(b => { b.x += b.vx * dt; b.y += b.vy * dt; });
        bullets = bullets.filter(b => b.y > -20 && b.x > -20 && b.x < canvas.width + 20);

        enemyBullets.forEach(b => { b.x += b.vx * dt; b.y += b.vy * dt; });
        enemyBullets = enemyBullets.filter(b => b.y < canvas.height + 20 && b.x > -20 && b.x < canvas.width + 20);

        enemies.forEach(e => e.y += e.vy * dt);
        enemies = enemies.filter(e => e.y < canvas.height + 60);
        
        particles.forEach(p => { p.x += p.vx * dt * 60; p.y += p.vy * dt * 60; p.alpha -= dt * 2; });
        particles = particles.filter(p => p.alpha > 0);

        // 碰撞检测
        for (let j = bullets.length - 1; j >= 0; j--) {
            let b = bullets[j]; let hit = false;
            if (boss.active && boss.state === 'fighting' && Math.hypot(boss.x - b.x, boss.y - b.y) < 90) {
                boss.hp--; bullets.splice(j, 1); hit = true; createExplosion(b.x, b.y, '#4ecdc4', 2);
                if (boss.hp <= 0) { gameState = 'GAMEOVER'; winGame(); }
            }
            if(hit) continue;
            for (let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i];
                if (Math.hypot(e.x - b.x, e.y - b.y) < e.radius + 15) {
                    e.hp--; bullets.splice(j, 1); hit = true; createExplosion(b.x, b.y, '#4ecdc4', 2);
                    if(e.hp <= 0) { enemies.splice(i, 1); createExplosion(e.x, e.y, '#ff85a2', 6); updateScore(50); }
                    break;
                }
            }
        }

        function checkHit(ex, ey, er) {
            let distToPlayer = Math.hypot(ex - player.x, ey - player.y);
            if (activeSpell === 'er') return false; 
            if (distToPlayer < er + player.hitRadius) {
                hp--; document.getElementById('hpDisplay').innerText = '❤️'.repeat(Math.max(0,hp)) + '🖤'.repeat(3-hp);
                createExplosion(player.x, player.y, '#ff4d6d', 20); screenShake = 8;
                if (hp <= 0) { gameState = 'GAMEOVER'; loseGame(); }
                return true; 
            }
            return false;
        }

        for (let i = enemies.length - 1; i >= 0; i--) { if (checkHit(enemies[i].x, enemies[i].y, enemies[i].radius)) enemies.splice(i, 1); }
        for (let i = enemyBullets.length - 1; i >= 0; i--) { if (checkHit(enemyBullets[i].x, enemyBullets[i].y, 6)) enemyBullets.splice(i, 1); }
    }

    function draw() {
        ctx.save();
        ctx.imageSmoothingEnabled = false; 
        if (screenShake > 0) ctx.translate((Math.random()-0.5)*screenShake, (Math.random()-0.5)*screenShake);

        ctx.fillStyle = '#fff0f5'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = 'rgba(255, 133, 162, 0.15)'; ctx.lineWidth = 2;
        let offsetY = (globalTime * 20) % 60;
        for(let i=0; i<canvas.width; i+=60) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke(); }
        for(let i=0; i<canvas.height; i+=60) { ctx.beginPath(); ctx.moveTo(0, i+offsetY); ctx.lineTo(canvas.width, i+offsetY); ctx.stroke(); }

        particles.forEach(p => {
            ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
        });
        ctx.globalAlpha = 1.0;

        // 👑 修复芝麻粒小可爱！原尺寸100，为了抵消透明边框，直接强行画 240x240！
        if (assets.player.complete && assets.player.naturalWidth) {
            // 注意这里的绘制尺寸，如果图片透明边距太大，就用大尺寸！
            ctx.drawImage(assets.player, player.x - 120, player.y - 120, 240, 240);
        }
        ctx.beginPath(); ctx.arc(player.x, player.y, player.hitRadius, 0, Math.PI*2); 
        ctx.fillStyle = 'rgba(255, 255, 255, 0.8)'; ctx.fill();

        // 👑 杂兵尺寸同步放大对抗透明边距
        enemies.forEach(e => {
            if (assets.enemyNormal.complete && assets.enemyNormal.naturalWidth) {
                ctx.drawImage(assets.enemyNormal, e.x - 80, e.y - 80, 160, 160);
            }
        });
        
        // 👑 子弹画 48x48
        bullets.forEach(b => {
            if (assets.bullet.complete && assets.bullet.naturalWidth) {
                ctx.drawImage(assets.bullet, b.x - 24, b.y - 24, 48, 48);
            }
        });
        
        enemyBullets.forEach(b => {
            ctx.beginPath(); ctx.arc(b.x, b.y, 6, 0, Math.PI*2);
            ctx.fillStyle = b.isRed ? '#ff4d6d' : '#8e44ad'; ctx.fill();
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
        });

        // 滤镜：如果正在做题，游戏画面变暗模糊
        if(gameState === 'QUIZ_PAUSE') {
            ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fillRect(0,0,canvas.width, canvas.height);
        }

        ctx.restore();
    }

    function createExplosion(x, y, color, count) {
        for(let k=0; k<count; k++) particles.push({ x: x, y: y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, size: Math.random()*4+2, alpha: 1, color: color });
    }
    
    function updateScore(pts) { score += pts; document.getElementById('scoreDisplay').innerText = `${score} 分`; }

    function gameLoop(timestamp) {
        let dt = (timestamp - lastTime) / 1000; if (dt > 0.05) dt = 0.05; 
        lastTime = timestamp; 
        update(dt); 
        draw();
        requestAnimationFrame(gameLoop); // 即使暂停也继续画，保持静止帧
    }

    // ==========================================
    // 🚨 全屏强制做题系统
    // ==========================================
    const spellCards = [
        { id: 'golgi', name: '🌸 高尔基体·囊泡散花', desc: '满血复活！你的抗体变成了超大范围散弹！', duration: 6, action: () => {} },
        { id: 'lysosome', name: '💦 溶酶体·水解大扫除', desc: '满血复活！屏幕上的坏蛋全部被水解酶洗掉啦！', duration: 2, action: () => { enemies.forEach(e => createExplosion(e.x, e.y, '#4ecdc4', 15)); enemies = []; enemyBullets = []; screenShake=8; } }
    ];

    const quizBank = [
        { q: "在细胞里，负责加工、分类和包装蛋白质，像个超级『快递物流中心』的细胞器是？", ans: "高尔基体", options: ["内质网", "高尔基体", "溶酶体"] },
        { q: "癌细胞为什么会在身体里到处跑？是因为它们细胞膜表面的什么东西减少了，导致粘不紧？", ans: "糖蛋白", options: ["磷脂分子", "糖蛋白", "胆固醇"] },
        { q: "被大家叫做『动力工厂』，能疯狂产生 ATP 能量的细胞器是？", ans: "线粒体", options: ["高尔基体", "叶绿体", "线粒体"] },
        { q: "能按照密码本(mRNA)的指示，把氨基酸合成蛋白质的『小机器』是？", ans: "核糖体", options: ["核糖体", "溶酶体", "中心体"] }
    ];

    function triggerFullScreenQuiz() {
        gameState = 'QUIZ_PAUSE'; // 彻底冻结游戏时间！
        document.getElementById('quizScreen').style.display = 'flex';
        
        let data = quizBank[Math.floor(Math.random() * quizBank.length)];
        document.getElementById('questionText').innerHTML = data.q;
        
        let optDiv = document.getElementById('optionsGroup'); optDiv.innerHTML = '';
        data.options.sort(() => Math.random() - 0.5).forEach(opt => {
            optDiv.innerHTML += `<label class="option-label" onclick="checkAnswer('${opt}', '${data.ans}')"><input type="radio" name="ans"> <strong>${opt}</strong></label>`;
        });
    }

    function checkAnswer(selected, correct) {
        if(selected === correct) {
            // 答对了解除时停，恢复能量
            playerAtp = MAX_ATP; 
            document.getElementById('quizScreen').style.display = 'none';
            gameState = 'PLAYING';
            lastTime = performance.now(); // 重置时间，防止卡顿瞬间位移
            
            let spell = spellCards[Math.floor(Math.random() * spellCards.length)];
            activeSpell = spell.id; spellTimer = spell.duration; spell.action();
            
            // 屏幕飘字特效
            let alertEl = document.getElementById('spellAlert');
            alertEl.innerText = spell.name;
            alertEl.style.opacity = '1';
            setTimeout(() => { alertEl.style.opacity = '0'; }, 2000);
            
        } else {
            // 答错了不让走，扣血惩罚！
            hp--; document.getElementById('hpDisplay').innerText = '❤️'.repeat(Math.max(0,hp)) + '🖤'.repeat(3-hp);
            if (hp <= 0) {
                document.getElementById('quizScreen').style.display = 'none';
                gameState = 'GAMEOVER'; loseGame();
            } else {
                document.getElementById('questionText').innerHTML = `<span style="color:#ff4d6d;">❌ 答错啦！导师很生气，扣除一滴血！<br>再好好想想正确答案是啥？</span>`;
                // 重新出同一题的选项
                let optDiv = document.getElementById('optionsGroup'); 
                let labels = optDiv.getElementsByClassName('option-label');
                for(let l of labels) l.style.border = '2px solid #ff4d6d';
            }
        }
    }

    function loseGame() {
        document.getElementById('startScreen').style.display = 'flex';
        document.querySelector('.story-text').innerHTML = `<span style="color:#ff4d6d; font-size:1.5rem; font-weight:bold;">呜哇！细胞膜破掉啦！<br>最终得分: ${score}</span>`;
    }
    function winGame() {
        document.getElementById('startScreen').style.display = 'flex';
        document.querySelector('.story-text').innerHTML = `<span style="color:#4ecdc4; font-size:1.5rem; font-weight:bold;">🎉 变异细胞已被消灭！<br>最终得分: ${score}</span>`;
    }
</script>
</body>
</html>
