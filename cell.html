<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>东方微观防卫战：细胞启示录</title>
    <style>
        /* 🌌 奢华科幻生物学 UI 主题 */
        :root {
            --primary: #00e5ff; --secondary: #ff4081; --bg-dark: #0a0a1a; --panel-bg: rgba(20, 20, 40, 0.65);
        }
        body {
            margin: 0; padding: 0; height: 100dvh; display: flex; flex-direction: column;
            background: radial-gradient(circle at center, #1a1a3a 0%, var(--bg-dark) 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; user-select: none; color: white;
        }
        /* 动态背景点缀 */
        body::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background-image: radial-gradient(rgba(0, 229, 255, 0.1) 1px, transparent 1px);
            background-size: 30px 30px; z-index: -1; opacity: 0.5;
        }

        /* 游戏区域容器：发光呼吸边框 */
        .game-container {
            flex: 1.3; display: flex; justify-content: center; align-items: center; position: relative;
            box-shadow: inset 0 0 50px rgba(0, 0, 0, 0.8);
        }
        canvas {
            max-width: 100%; max-height: 100%; object-fit: contain;
            border-bottom: 2px solid var(--primary);
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.2); background: #050510;
        }

        /* 答题面板：拟态玻璃质感 (Glassmorphism) */
        .quiz-area {
            flex: 1; padding: 20px 25px; overflow-y: auto;
            background: var(--panel-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-top: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5); z-index: 10;
        }

        /* 💻 宽屏适配 */
        @media (min-width: 800px) {
            body { flex-direction: row; padding: 30px; gap: 30px; align-items: center; justify-content: center; }
            .game-container { flex: none; height: 90vh; aspect-ratio: 3/4; border-radius: 20px; overflow: hidden; border: 1px solid rgba(0,229,255,0.3); box-shadow: 0 0 40px rgba(0,229,255,0.15); }
            canvas { border: none; border-radius: 20px; }
            .quiz-area { width: 400px; flex: none; height: 90vh; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        }

        h2 { margin-top: 0; font-size: 1.4rem; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px rgba(0,229,255,0.5); display: flex; align-items: center; gap: 10px; border-bottom: 1px solid rgba(0,229,255,0.2); padding-bottom: 10px; }
        .hp-bar { font-size: 1.2rem; margin: 10px 0; display: flex; justify-content: space-between; align-items: center; }
        .hp-hearts { color: var(--secondary); text-shadow: 0 0 10px var(--secondary); }
        
        #questionText { color: #e0e0e0; min-height: 60px; font-size: 1.05rem; line-height: 1.6; margin-bottom: 15px; }
        
        .option-label {
            display: block; margin-bottom: 10px; padding: 12px 15px; background: rgba(255,255,255,0.05);
            border-radius: 8px; cursor: pointer; border-left: 4px solid transparent; transition: all 0.3s ease;
        }
        .option-label:hover { background: rgba(255,255,255,0.1); border-left-color: var(--primary); transform: translateX(5px); }
        
        .cute-btn {
            background: linear-gradient(45deg, #00b4db, #0083b0); color: white; border: none;
            padding: 15px; border-radius: 30px; font-weight: bold; font-size: 1.1rem; cursor: pointer;
            width: 100%; margin-top: 15px; transition: 0.3s; box-shadow: 0 5px 15px rgba(0, 180, 219, 0.4);
            text-transform: uppercase; letter-spacing: 1px;
        }
        .cute-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0, 180, 219, 0.6); }
        .cute-btn:active { transform: translateY(1px); }

        /* 符卡触发文字特效 */
        #spellAlert { color: #ffeb3b; font-weight: bold; font-size: 1.1rem; text-align: center; height: 25px; margin-bottom: 10px; text-shadow: 0 0 10px #ffeb3b; }
    </style>
</head>
<body>

    <div class="game-container">
        <canvas id="gameStage" width="600" height="800"></canvas>
    </div>
    
    <div class="quiz-area">
        <h2>🔬 细胞生物学中枢</h2>
        <div class="hp-bar">
            <span>细胞膜稳定性:</span>
            <span class="hp-hearts" id="hpDisplay">❤️❤️❤️</span>
        </div>
        <div id="spellAlert"></div>
        <p id="questionText">系统待机。答对下方专业考点，即可重组细胞骨架，释放特异性符卡弹幕！</p>
        <div id="optionsGroup"></div>
        <button class="cute-btn" onclick="triggerQuiz()">🧬 提取受体信号</button>
    </div>

<script>
    // ==========================================
    // 🎨 美术总监 (暮雨) 专属图片插槽
    // ==========================================
    const assets = { player: new Image(), enemyNormal: new Image(), enemyBoss: new Image(), bullet: new Image() };
    assets.player.src = 'image_16.png';       
    assets.enemyNormal.src = 'image_17.png';  
    assets.enemyBoss.src = 'image_18.png';   
    assets.bullet.src = 'image_19.png';       

    // ==========================================
    // 🚀 核心东方弹幕引擎 V4
    // ==========================================
    const canvas = document.getElementById('gameStage');
    const ctx = canvas.getContext('2d');
    
    let hp = 3; let score = 0; let isGameOver = false;
    let lastTime = performance.now(); let fireTimer = 0; let spawnTimer = 0; let globalTime = 0;
    
    // 东方核心设定
    const player = { x: 300, y: 700, hitRadius: 3, grazeRadius: 35, speed: 450 }; 
    let boss = { active: false, x: 300, y: -100, hp: 600, maxHp: 600, state: 'waiting', phase: 1, phaseTimer: 0, spellName: '' };
    
    let bullets = []; let enemyBullets = []; let enemies = []; let particles = [];
    
    // UI 特效与符卡宣告
    let activeSpell = null; let spellTimer = 0; let timeScale = 1.0;
    let screenShake = 0; let cutinText = ""; let cutinTimer = 0;

    // 触控监听
    let touchActive = false; let targetX = player.x; let targetY = player.y;
    canvas.addEventListener('touchmove', e => {
        e.preventDefault(); touchActive = true;
        let rect = canvas.getBoundingClientRect();
        targetX = (e.touches[0].clientX - rect.left) * (canvas.width / rect.width);
        targetY = (e.touches[0].clientY - rect.top) * (canvas.height / rect.height);
    }, {passive: false});

    function update(dt) {
        if (isGameOver) return;
        globalTime += dt;
        
        // 符卡时间与屏幕震动衰减
        if (spellTimer > 0) {
            spellTimer -= dt;
            if (spellTimer <= 0) { activeSpell = null; timeScale = 1.0; document.getElementById('spellAlert').innerText = ""; }
        }
        if (screenShake > 0) screenShake -= dt * 20;
        if (cutinTimer > 0) cutinTimer -= dt;

        // 1. 玩家移动
        if (touchActive) {
            player.x += (targetX - player.x) * 15 * dt;
            player.y += (targetY - player.y) * 15 * dt;
        }
        player.x = Math.max(20, Math.min(canvas.width - 20, player.x));
        player.y = Math.max(20, Math.min(canvas.height - 20, player.y));

        // 2. 玩家开火
        fireTimer += dt;
        let fireRate = activeSpell === 'mitochondria' ? 0.04 : 0.12; 
        if (fireTimer > fireRate) {
            if (activeSpell === 'golgi') {
                // 高尔基体散弹
                for(let i=-2; i<=2; i++) bullets.push({x: player.x, y: player.y, vx: i*100, vy: -700, color: '#00e5ff'});
            } else {
                bullets.push({x: player.x - 10, y: player.y, vx: 0, vy: -800, color: '#00e5ff'});
                bullets.push({x: player.x + 10, y: player.y, vx: 0, vy: -800, color: '#00e5ff'});
            }
            fireTimer = 0;
        }

        // 3. 👺 绝望的 Boss 战逻辑 (东方精髓：多阶段弹幕)
        if (score >= 1000 && !boss.active) {
            boss.active = true; boss.state = 'entering'; enemies = []; triggerCutin("【警报：恶性变异细胞体 逼近】", 3);
        }

        if (boss.active) {
            boss.phaseTimer += dt * timeScale;
            if (boss.state === 'entering') {
                boss.y += 80 * dt;
                if (boss.y > 180) { boss.state = 'fighting'; boss.phase = 1; triggerCutin("【增殖符卡：DNA双螺旋解旋】", 3); }
            } else if (boss.state === 'fighting') {
                // Boss 漂浮走位
                boss.x = 300 + Math.sin(globalTime) * 150;
                boss.y = 180 + Math.cos(globalTime * 1.5) * 30;

                // 阶段 1: DNA双螺旋弹幕 (交叉螺旋线)
                if (boss.phase === 1) {
                    if (boss.phaseTimer > 0.08) {
                        let angle1 = globalTime * 3;
                        let angle2 = globalTime * 3 + Math.PI;
                        enemyBullets.push({x: boss.x, y: boss.y, vx: Math.cos(angle1)*250, vy: Math.sin(angle1)*250 + 100, type: 'orb'});
                        enemyBullets.push({x: boss.x, y: boss.y, vx: Math.cos(angle2)*250, vy: Math.sin(angle2)*250 + 100, type: 'orb'});
                        boss.phaseTimer = 0;
                    }
                    if (boss.hp < 400) { boss.phase = 2; triggerCutin("【分裂符卡：微管纺锤体放射】", 3); }
                }
                // 阶段 2: 纺锤体放射 (全屏花瓣型爆发)
                else if (boss.phase === 2) {
                    if (boss.phaseTimer > 1.5) {
                        for(let i=0; i<24; i++) {
                            let angle = (i / 24) * Math.PI * 2 + (globalTime * 0.5);
                            enemyBullets.push({x: boss.x, y: boss.y, vx: Math.cos(angle)*300, vy: Math.sin(angle)*300, type: 'needle'});
                        }
                        boss.phaseTimer = 0;
                        screenShake = 5;
                    }
                    if (boss.hp < 200) { boss.phase = 3; triggerCutin("【终极奥义：细胞因子风暴】", 4); }
                }
                // 阶段 3: 追踪死光 + 散弹 (压迫感拉满)
                else if (boss.phase === 3) {
                    if (boss.phaseTimer > 0.2) {
                        // 瞄准玩家的子弹
                        let dx = player.x - boss.x; let dy = player.y - boss.y;
                        let angle = Math.atan2(dy, dx) + (Math.random()-0.5)*0.5;
                        enemyBullets.push({x: boss.x, y: boss.y, vx: Math.cos(angle)*400, vy: Math.sin(angle)*400, type: 'orb_red'});
                        // 随机散弹
                        let randA = Math.random() * Math.PI * 2;
                        enemyBullets.push({x: boss.x, y: boss.y, vx: Math.cos(randA)*150, vy: Math.sin(randA)*150 + 150, type: 'needle'});
                        boss.phaseTimer = 0;
                    }
                }
            }
        } else {
            // 杂兵生成 (非 Boss 战期间)
            spawnTimer += dt * timeScale;
            if (spawnTimer > 0.8) {
                enemies.push({ x: Math.random() * (canvas.width - 80) + 40, y: -40, radius: 25, vy: Math.random() * 50 + 120, hp: 2 });
                spawnTimer = 0;
            }
        }

        // 4. 坐标更新与越界清理
        bullets.forEach(b => { b.x += b.vx * dt; b.y += b.vy * dt; });
        bullets = bullets.filter(b => b.y > -20 && b.x > -20 && b.x < canvas.width + 20);

        enemyBullets.forEach(b => { b.x += b.vx * dt * timeScale; b.y += b.vy * dt * timeScale; });
        enemyBullets = enemyBullets.filter(b => b.y < canvas.height + 20 && b.x > -20 && b.x < canvas.width + 20 && b.y > -50);

        enemies.forEach(e => e.y += e.vy * dt * timeScale);
        enemies = enemies.filter(e => e.y < canvas.height + 40);
        
        particles.forEach(p => { p.x += p.vx * dt * 60; p.y += p.vy * dt * 60; p.alpha -= dt * 2.5; });
        particles = particles.filter(p => p.alpha > 0);

        // 5. 碰撞检测
        for (let j = bullets.length - 1; j >= 0; j--) {
            let b = bullets[j]; let hit = false;
            // 打 Boss
            if (boss.active && boss.state === 'fighting' && Math.hypot(boss.x - b.x, boss.y - b.y) < 60) {
                boss.hp--; bullets.splice(j, 1); hit = true;
                createExplosion(b.x, b.y, '#00e5ff', 3);
                if (boss.hp <= 0) { isGameOver = true; triggerCutin("【恶性变异 已被清除】", 5); setTimeout(winGame, 2000); }
            }
            if(hit) continue;
            // 打杂兵
            for (let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i];
                if (Math.hypot(e.x - b.x, e.y - b.y) < e.radius + 15) {
                    e.hp--; bullets.splice(j, 1); hit = true;
                    createExplosion(b.x, b.y, '#00e5ff', 3);
                    if(e.hp <= 0) { enemies.splice(i, 1); createExplosion(e.x, e.y, '#ff4081', 8); score += 50; }
                    break;
                }
            }
        }

        // 玩家受击与“隐形擦弹”加分
        function checkPlayerHit(ex, ey, eradius) {
            let distToPlayer = Math.hypot(ex - player.x, ey - player.y);
            if (activeSpell === 'er') return; // 内质网无敌护盾
            
            // 擦弹加分 (不再显示UI，但老师在后台会发现分数涨得很快！)
            if (distToPlayer < eradius + player.grazeRadius && distToPlayer > eradius + player.hitRadius) {
                score += 2; // 隐形加分
            } 
            // 真实命中判定
            else if (distToPlayer < eradius + player.hitRadius) {
                hp--; document.getElementById('hpDisplay').innerText = '❤️'.repeat(Math.max(0,hp)) + '🖤'.repeat(3-hp);
                createExplosion(player.x, player.y, '#ff0000', 30);
                screenShake = 15;
                if (hp <= 0) { isGameOver = true; loseGame(); }
                return true; 
            }
            return false;
        }

        for (let i = enemies.length - 1; i >= 0; i--) { if (checkPlayerHit(enemies[i].x, enemies[i].y, enemies[i].radius)) { enemies.splice(i, 1); } }
        for (let i = enemyBullets.length - 1; i >= 0; i--) { if (checkPlayerHit(enemyBullets[i].x, enemyBullets[i].y, 5)) { enemyBullets.splice(i, 1); } }
    }

    // 🎨 顶级渲染引擎
    function draw() {
        ctx.save();
        // 屏幕震动
        if (screenShake > 0) {
            let dx = (Math.random()-0.5)*screenShake; let dy = (Math.random()-0.5)*screenShake;
            ctx.translate(dx, dy);
        }

        // 清屏与炫酷网格背景
        ctx.fillStyle = '#050510'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = 'rgba(0, 229, 255, 0.05)'; ctx.lineWidth = 1;
        let offsetY = (globalTime * 50) % 50;
        for(let i=0; i<canvas.width; i+=50) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke(); }
        for(let i=0; i<canvas.height; i+=50) { ctx.beginPath(); ctx.moveTo(0, i+offsetY); ctx.lineTo(canvas.width, i+offsetY); ctx.stroke(); }

        // 绘制特效粒子
        ctx.globalCompositeOperation = 'lighter';
        particles.forEach(p => {
            ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
        });
        ctx.globalCompositeOperation = 'source-over'; ctx.globalAlpha = 1.0;

        // 绘制玩家
        if (assets.player.complete && assets.player.naturalWidth) {
            ctx.drawImage(assets.player, player.x - 30, player.y - 30, 60, 60);
            if(activeSpell === 'er') { // 护盾特效
                ctx.beginPath(); ctx.arc(player.x, player.y, 45, 0, Math.PI*2);
                ctx.strokeStyle = 'rgba(0, 229, 255, 0.8)'; ctx.lineWidth = 4; ctx.stroke();
            }
        }
        // 东方精髓：极小核心判定点
        ctx.beginPath(); ctx.arc(player.x, player.y, player.hitRadius + 1, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(255,255,255,0.9)'; ctx.fill();
        ctx.strokeStyle = '#ff4081'; ctx.lineWidth = 2; ctx.stroke();

        // 绘制 Boss
        if (boss.active) {
            if (assets.enemyBoss.complete && assets.enemyBoss.naturalWidth) {
                ctx.drawImage(assets.enemyBoss, boss.x - 70, boss.y - 70, 140, 140);
            }
            // 环形血条 (超炫酷)
            ctx.beginPath(); ctx.arc(boss.x, boss.y, 80, -Math.PI/2, -Math.PI/2 + (Math.PI*2 * (boss.hp/boss.maxHp)));
            ctx.strokeStyle = boss.phase === 3 ? '#ff0000' : '#ff4081'; ctx.lineWidth = 6; ctx.stroke();
        }

        // 绘制杂兵与子弹
        enemies.forEach(e => {
            if (assets.enemyNormal.complete && assets.enemyNormal.naturalWidth) ctx.drawImage(assets.enemyNormal, e.x - e.radius, e.y - e.radius, e.radius*2, e.radius*2);
        });
        
        // 玩家子弹
        bullets.forEach(b => {
            if (assets.bullet.complete && assets.bullet.naturalWidth) ctx.drawImage(assets.bullet, b.x - 12, b.y - 12, 24, 24);
            else { ctx.fillStyle = b.color; ctx.beginPath(); ctx.arc(b.x, b.y, 5, 0, Math.PI*2); ctx.fill(); }
        });
        
        // 敌方东方风弹幕
        enemyBullets.forEach(b => {
            ctx.beginPath(); ctx.arc(b.x, b.y, b.type === 'needle' ? 4 : 6, 0, Math.PI*2);
            ctx.fillStyle = b.type === 'orb_red' ? '#ff0000' : '#ff4081'; ctx.fill();
            ctx.shadowBlur = 10; ctx.shadowColor = ctx.fillStyle; ctx.fill(); ctx.shadowBlur = 0;
        });

        // 🎨 UI 与 符卡宣告特效 (立绘 Cut-in)
        ctx.fillStyle = 'rgba(255,255,255,0.9)'; ctx.textAlign = 'left'; ctx.font = 'bold 18px Arial';
        ctx.fillText(`ATP 浓度: ${score}`, 15, 30);
        if(!boss.active) {
            ctx.fillRect(15, 45, 200, 8);
            ctx.fillStyle = '#00e5ff'; ctx.fillRect(15, 45, 200 * Math.min(1, score/1000), 8);
            ctx.fillText(`受体结合率: ${Math.min(100, Math.floor(score/10))}%`, 15, 75);
        }

        if (cutinTimer > 0) {
            ctx.fillStyle = `rgba(0, 0, 0, ${Math.min(0.5, cutinTimer)})`; ctx.fillRect(0, canvas.height/2 - 60, canvas.width, 120);
            ctx.fillStyle = `rgba(0, 229, 255, ${Math.min(1, cutinTimer)})`;
            ctx.font = 'italic bold 28px "Microsoft YaHei"'; ctx.textAlign = 'center';
            ctx.fillText(cutinText, canvas.width/2 + (2-cutinTimer)*20, canvas.height/2 + 10);
        }
        ctx.restore();
    }

    function triggerCutin(text, time) { cutinText = text; cutinTimer = time; }
    function createExplosion(x, y, color, count) {
        for(let k=0; k<count; k++) particles.push({ x: x, y: y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, size: Math.random()*4+2, alpha: 1, color: color });
    }

    function gameLoop(timestamp) {
        let dt = (timestamp - lastTime) / 1000; if (dt > 0.05) dt = 0.05; 
        lastTime = timestamp; update(dt); draw();
        if (!isGameOver) requestAnimationFrame(gameLoop);
    }
    requestAnimationFrame(gameLoop);

    function loseGame() {
        document.getElementById('questionText').innerHTML = `<span style="color:#ff4081; font-size:1.3rem; font-weight:bold;">🚨 细胞膜崩解！<br>最终 ATP 浓度: ${score}</span>`;
        document.getElementById('optionsGroup').innerHTML = `<button class="cute-btn" onclick="location.reload()">重新注入靶向药物</button>`;
    }
    function winGame() {
        document.getElementById('questionText').innerHTML = `<span style="color:#00e5ff; font-size:1.3rem; font-weight:bold;">🎉 恶性细胞清除成功！<br>微观稳态已恢复！</span>`;
        document.getElementById('optionsGroup').innerHTML = `<button class="cute-btn" onclick="location.reload()">进入下一增殖周期</button>`;
    }

    // ==========================================
    // 🧬 细胞生物学硬核题库 & 符卡系统
    // ==========================================
    const spellCards = [
        { id: 'golgi', name: '【分泌·高尔基体囊泡群】', desc: '分泌海量特异性抗体囊泡！(扇形散弹)', duration: 6, action: () => {} },
        { id: 'lysosome', name: '【自噬·溶酶体之吞噬】', desc: '水解酶大爆发，溶解屏幕内所有异物！', duration: 2, action: () => { enemies.forEach(e => createExplosion(e.x, e.y, '#00e5ff', 15)); enemies = []; enemyBullets = []; screenShake=10; } },
        { id: 'ribosome', name: '【微管·纺锤体之牵引】', desc: '冻结细胞液流动，敌方减速 70%！(子弹时间)', duration: 5, action: () => { timeScale = 0.3; } },
        { id: 'mitochondria', name: '【代谢·线粒体暴走】', desc: 'ATP极速水解，射速突破极限！', duration: 5, action: () => {} },
        { id: 'er', name: '【防御·内质网钙流护盾】', desc: '释放钙离子形成绝对防御稳态，免疫伤害！', duration: 5, action: () => {} }
    ];

    const quizBank = [
        { q: "被誉为细胞的『骨架』，主要由微管、微丝和中间纤维构成，负责维持细胞形态的是？", ans: "细胞骨架", options: ["细胞壁", "细胞骨架", "细胞外基质"] },
        { q: "在细胞通讯中，位于细胞膜表面，能特异性识别并结合信号分子（如激素）的蛋白质被称为？", ans: "受体 (Receptor)", options: ["受体 (Receptor)", "载体 (Carrier)", "通道 (Channel)"] },
        { q: "真核细胞中，具有双层膜结构，且内部含有自身DNA，被称为『半自主性细胞器』的是？", ans: "线粒体与叶绿体", options: ["高尔基体与内质网", "线粒体与叶绿体", "溶酶体与过氧化物酶体"] },
        { q: "细胞程序性死亡（如蝌蚪尾巴的消失）在生物学上有一个非常优美的专业名词，它是？", ans: "细胞凋亡 (Apoptosis)", options: ["细胞坏死 (Necrosis)", "细胞自噬 (Autophagy)", "细胞凋亡 (Apoptosis)"] },
        { q: "动物细胞膜的主要基本骨架是由什么物质构成的双层结构？", ans: "磷脂双分子层", options: ["糖蛋白网络", "磷脂双分子层", "胆固醇晶体"] }
    ];

    function triggerQuiz() {
        if(isGameOver) return;
        let data = quizBank[Math.floor(Math.random() * quizBank.length)];
        document.getElementById('questionText').innerHTML = `<strong>[系统提问]</strong><br>${data.q}`;
        let optDiv = document.getElementById('optionsGroup'); optDiv.innerHTML = '';
        data.options.sort(() => Math.random() - 0.5).forEach(opt => {
            optDiv.innerHTML += `<label class="option-label" onclick="checkAnswer('${opt}', '${data.ans}')"><input type="radio" name="ans"> <strong>${opt}</strong></label>`;
        });
    }

    function checkAnswer(selected, correct) {
        if(selected === correct) {
            let spell = spellCards[Math.floor(Math.random() * spellCards.length)];
            activeSpell = spell.id; spellTimer = spell.duration; spell.action();
            document.getElementById('spellAlert').innerHTML = `💥 符卡宣告：${spell.name} 💥`;
            triggerCutin(spell.name, 2.5); // 画布内播放大字宣告
            document.getElementById('questionText').innerHTML = `<span style="color:#00e5ff;">[识别通过]</span><br>${spell.desc}`;
            score += 200;
        } else {
            document.getElementById('questionText').innerHTML = `<span style="color:#ff4081; font-weight:bold;">[受体排斥] 信号转导失败！<br>正确通路为：${correct}</span>`;
            screenShake = 5; // 答错稍微震动一下惩罚
        }
        document.getElementById('optionsGroup').innerHTML = ''; 
    }
</script>
